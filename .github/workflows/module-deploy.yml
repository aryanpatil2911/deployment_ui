name: Module Deploy

on:
  workflow_dispatch:
    inputs:
      client:
        description: 'Client name'
        required: true
        type: choice
        options:
          - QA
          - BAIN
          - DKCM
          - MASH
          - KLIM
          - MPCM
          - EPCM
          - MTEU
          - QRMO
          - DEMO
      module:
        description: 'Module/Application name matching App folder (example: Recon, CIDM, Tools, AI Engine, etc.)'
        required: true
        default: Recon
        type: string
      version:
        description: 'Module version (e.g., 2.26.0428.92)'
        required: true
        type: string
      stage:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - QA
          - UAT
          - PROD
      triggered_by:
        description: 'User who originally requested the deployment (passed through from dashboard)'
        required: false
        type: string
      issue_number:
        description: 'GitHub issue number to close on deployment completion (passed through from dashboard)'
        required: false
        type: string
# Prevent the exact same client/module/version/stage combination from running twice simultaneously.
# The second run queues and waits rather than failing or cancelling.
concurrency:
  group: deploy-${{ inputs.client }}-${{ inputs.module }}-${{ inputs.version }}-${{ inputs.stage }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  read-components:
    runs-on: ${{ fromJSON((inputs.stage == 'QA' && '["self-hosted","QA02-Deployment"]') || (inputs.stage == 'UAT' && '["self-hosted","UAT-Deployment"]') || '["self-hosted","PROD-Deployment"]') }}
    outputs:
      api_components: ${{ steps.parse.outputs.api_components }}
      db_components: ${{ steps.parse.outputs.db_components }}
      config_components: ${{ steps.parse.outputs.config_components }}
      web_components: ${{ steps.parse.outputs.web_components }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Parse module YAML for components
        id: parse
        shell: powershell
        run: |
          $module = "${{ inputs.module }}"
          $version = "${{ inputs.version }}"
          $yamlPath = "App/$module/${module}_$version.yml"
          
          if (!(Test-Path $yamlPath)) {
            Write-Error "YAML file not found: $yamlPath"
            exit 1
          }
          
          # Parse YAML manually.
          # Preferred format:
          # service:
          #   components:
          #     - type: api|api_configuration|configuration|database|web|web_configuration
          #       component: CONFIG_KEY
          # Backward compatibility:
          # service:
          #   components:
          #     api:
          #     api1:
          #     web:
          #     database:
          $lines = Get-Content $yamlPath
          $currentComponent = $null
          $components = @{}
          $apiComponents = @()
          $dbComponents = @()
          $configComponents = @()
          $webComponents = @()

          $currentType = $null
          $currentConfiguration = $null
          $newFormatSeen = $false

          foreach ($line in $lines) {
            if ($line -match '^\s+-\s+type:\s*(api|api_configuration|configuration|database|web|web_configuration)\s*$') {
              if ($newFormatSeen -and $currentType -and -not [string]::IsNullOrWhiteSpace($currentConfiguration)) {
                $bucketType = $currentType

                if ($bucketType -ieq 'api') { $apiComponents += $currentConfiguration }
                elseif ($bucketType -ieq 'database') { $dbComponents += $currentConfiguration }
                elseif ($bucketType -ieq 'configuration') { $configComponents += $currentConfiguration }
                elseif ($bucketType -ieq 'web') { $webComponents += $currentConfiguration }
              }

              $newFormatSeen = $true
              $currentType = switch ($matches[1]) {
                'api_configuration' { 'api' }
                'configuration' { 'configuration' }
                'web_configuration' { 'web' }
                default { $matches[1] }
              }
              $currentConfiguration = $null
              continue
            }

            if ($newFormatSeen -and $currentType -and $line -match '^\s+component:\s*(.+?)\s*$') {
              $currentConfiguration = $matches[1].Trim().Trim("'").Trim('"')
              continue
            }
          }

          if ($newFormatSeen -and $currentType -and -not [string]::IsNullOrWhiteSpace($currentConfiguration)) {
            $bucketType = $currentType

            if ($bucketType -ieq 'api') { $apiComponents += $currentConfiguration }
            elseif ($bucketType -ieq 'database') { $dbComponents += $currentConfiguration }
            elseif ($bucketType -ieq 'configuration') { $configComponents += $currentConfiguration }
            elseif ($bucketType -ieq 'web') { $webComponents += $currentConfiguration }
          }
          
          if (-not $newFormatSeen) {
            foreach ($line in $lines) {
              if ($line -match '^\s{4}([^:\s]+):\s*$') {
                $currentComponent = $matches[1]
                $components[$currentComponent] = @{}
              }
            }

            $apiComponents = @(
              $components.Keys |
                Where-Object { $_ -match '^api\d*$' } |
                Sort-Object
            )

            $dbComponents = @(
              $components.Keys |
                Where-Object { $_ -match '^(db|database)$' } |
                Sort-Object
            )

            $webComponents = @(
              $components.Keys |
                Where-Object { $_ -match '^web\d*$' } |
                Sort-Object
            )
          }

          $apiComponents = @($apiComponents | Where-Object { -not [string]::IsNullOrWhiteSpace($_) } | Sort-Object -Unique)
          $dbComponents = @($dbComponents | Where-Object { -not [string]::IsNullOrWhiteSpace($_) } | Sort-Object -Unique)
          $configComponents = @($configComponents | Where-Object { -not [string]::IsNullOrWhiteSpace($_) } | Sort-Object -Unique)
          $webComponents = @($webComponents | Where-Object { -not [string]::IsNullOrWhiteSpace($_) } | Sort-Object -Unique)

          $apiComponentsJson = "[" + (($apiComponents | ForEach-Object { '"' + $_ + '"' }) -join ",") + "]"
          $dbComponentsJson = "[" + (($dbComponents | ForEach-Object { '"' + $_ + '"' }) -join ",") + "]"
          $configComponentsJson = "[" + (($configComponents | ForEach-Object { '"' + $_ + '"' }) -join ",") + "]"
          $webComponentsJson = "[" + (($webComponents | ForEach-Object { '"' + $_ + '"' }) -join ",") + "]"

          Add-Content $env:GITHUB_OUTPUT "api_components=$apiComponentsJson"
          Add-Content $env:GITHUB_OUTPUT "db_components=$dbComponentsJson"
          Add-Content $env:GITHUB_OUTPUT "config_components=$configComponentsJson"
          Add-Content $env:GITHUB_OUTPUT "web_components=$webComponentsJson"

          Write-Host "API components: $apiComponentsJson"
          Write-Host "DB components: $dbComponentsJson"
          Write-Host "Config components: $configComponentsJson"
          Write-Host "Web components: $webComponentsJson"

  web-deploy:
    name: Web deploy (${{ matrix.component }})
    needs: [read-components, record-deployment-start]
    if: needs.read-components.outputs.web_components != '[]'
    strategy:
      fail-fast: false
      matrix:
        component: ${{ fromJSON(needs.read-components.outputs.web_components) }}
    uses: ./.github/workflows/web-deploy.yml
    with:
      client: ${{ inputs.client }}
      application: ${{ inputs.module }}
      version: ${{ inputs.version }}
      stage: ${{ inputs.stage }}
      component: ${{ matrix.component }}
    secrets: inherit

  api-deploy:
    name: API deploy (${{ matrix.component }})
    needs: [read-components, web-deploy, record-deployment-start]
    if: ${{ always() && needs.read-components.outputs.api_components != '[]' && (needs.web-deploy.result == 'success' || needs.web-deploy.result == 'skipped') }}
    strategy:
      fail-fast: false
      matrix:
        component: ${{ fromJSON(needs.read-components.outputs.api_components) }}
    uses: ./.github/workflows/api-deploy.yml
    with:
      client: ${{ inputs.client }}
      application: ${{ inputs.module }}
      version: ${{ inputs.version }}
      stage: ${{ inputs.stage }}
      component: ${{ matrix.component }}
    secrets: inherit

  db-deploy:
    name: DB deploy (${{ matrix.component }})
    needs: [read-components, api-deploy, record-deployment-start]
    if: ${{ always() && needs.read-components.outputs.db_components != '[]' && (needs.api-deploy.result == 'success' || needs.api-deploy.result == 'skipped') }}
    strategy:
      fail-fast: false
      matrix:
        component: ${{ fromJSON(needs.read-components.outputs.db_components) }}
    uses: ./.github/workflows/db-deploy.yml
    with:
      client: ${{ inputs.client }}
      application: ${{ inputs.module }}
      version: ${{ inputs.version }}
      stage: ${{ inputs.stage }}
      component: ${{ matrix.component }}
    secrets: inherit

  config-deploy:
    name: Configuration deploy (${{ matrix.component }})
    needs: [read-components, db-deploy, record-deployment-start]
    if: ${{ always() && needs.read-components.outputs.config_components != '[]' && (needs.db-deploy.result == 'success' || needs.db-deploy.result == 'skipped') }}
    strategy:
      fail-fast: false
      matrix:
        component: ${{ fromJSON(needs.read-components.outputs.config_components) }}
    uses: ./.github/workflows/config-deploy.yml
    with:
      client: ${{ inputs.client }}
      application: ${{ inputs.module }}
      version: ${{ inputs.version }}
      stage: ${{ inputs.stage }}
      component: ${{ matrix.component }}
    secrets: inherit

  record-deployment-start:
    name: Record deployment start
    needs: [read-components]
    # Serialize CSV writes across all parallel deployments so no two runs
    # read-modify-write the log file at the same time.
    concurrency:
      group: csv-log-write
      cancel-in-progress: false
    runs-on: ${{ fromJSON((inputs.stage == 'QA' && '["self-hosted","QA02-Deployment"]') || (inputs.stage == 'UAT' && '["self-hosted","UAT-Deployment"]') || '["self-hosted","PROD-Deployment"]') }}
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout deployment logs branch
        uses: actions/checkout@v5
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: main
          fetch-depth: 0

      - name: Record deployment start
        id: create_csv
        shell: powershell
        run: |
          $timestamp = (Get-Date).ToUniversalTime().ToString("yyyy-MM-dd HH:mm:ss 'UTC'")

          function Normalize-DeploymentRow {
            param([psobject]$Row)

            $properties = $Row.PSObject.Properties.Name
            $deploymentDateTime = if ($properties -contains 'DeploymentDateTime') { $Row.DeploymentDateTime } else { '' }
            [pscustomobject]@{
              Client = $Row.Client
              Application = $Row.Application
              Version = $Row.Version
              Environment = $Row.Environment
              DeploymentStatus = $Row.DeploymentStatus
              DeploymentStartDateTime = if ($properties -contains 'DeploymentStartDateTime' -and -not [string]::IsNullOrWhiteSpace($Row.DeploymentStartDateTime)) { $Row.DeploymentStartDateTime } elseif (-not [string]::IsNullOrWhiteSpace($deploymentDateTime)) { $deploymentDateTime } else { '' }
              DeploymentEndDateTime = if ($properties -contains 'DeploymentEndDateTime' -and -not [string]::IsNullOrWhiteSpace($Row.DeploymentEndDateTime)) { $Row.DeploymentEndDateTime } elseif (-not [string]::IsNullOrWhiteSpace($deploymentDateTime)) { $deploymentDateTime } else { '' }
              TriggeredBy = $Row.TriggeredBy
              ActionRunUrl = if ($properties -contains 'ActionRunUrl') { $Row.ActionRunUrl } else { '' }
            }
          }

          $record = [pscustomobject]@{
            Client = "${{ inputs.client }}"
            Application = "${{ inputs.module }}"
            Version = "${{ inputs.version }}"
            Environment = "${{ inputs.stage }}"
            DeploymentStatus = 'InProgress'
            DeploymentStartDateTime = $timestamp
            DeploymentEndDateTime = ''
            TriggeredBy = if ("${{ inputs.triggered_by }}" -ne "") { "${{ inputs.triggered_by }}" } else { "${{ github.actor }}" }
            ActionRunUrl = "$env:GITHUB_SERVER_URL/$env:GITHUB_REPOSITORY/actions/runs/$env:GITHUB_RUN_ID"
          }

          $logDirectory = "DeploymentLogs"
          New-Item -ItemType Directory -Path $logDirectory -Force | Out-Null

          $csvPath = Join-Path $logDirectory 'DeploymentLogs.csv'

          $rows = @()
          if (Test-Path $csvPath) {
            $rows = @(Import-Csv $csvPath | ForEach-Object { Normalize-DeploymentRow $_ })
          }

          $recordKey = "${{ inputs.client }}|${{ inputs.module }}|${{ inputs.version }}|${{ inputs.stage }}"
          $existingIndex = -1

          for ($index = 0; $index -lt $rows.Count; $index++) {
            $existingKey = "$($rows[$index].Client)|$($rows[$index].Application)|$($rows[$index].Version)|$($rows[$index].Environment)"
            if ($existingKey -ieq $recordKey) {
              $existingIndex = $index
              break
            }
          }

          if ($existingIndex -ge 0) {
            $rows[$existingIndex] = $record
          } else {
            $rows = @($record) + @($rows)
          }

          $rows |
            Select-Object Client, Application, Version, Environment, DeploymentStatus, DeploymentStartDateTime, DeploymentEndDateTime, TriggeredBy, ActionRunUrl |
            Export-Csv -Path $csvPath -NoTypeInformation

          Write-Host "Recorded deployment start in $csvPath"
          Get-Content $csvPath

          Add-Content $env:GITHUB_OUTPUT "csv_path=$csvPath"

      - name: Check in deployment summary CSV
        uses: actions/github-script@v7
        env:
          CSV_PATH: ${{ steps.create_csv.outputs.csv_path }}
          BRANCH_NAME: main
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const fs = require('fs');
            const path = require('path');

            const csvPath = process.env.CSV_PATH;
            const branchName = process.env.BRANCH_NAME;
            const csvContent = fs.readFileSync(csvPath);
            const csvRepoPath = path.posix.join('DeploymentLogs', 'DeploymentLogs.csv');

            async function upsertFile(repoPath, fileContent, message) {
              let sha;

              try {
                const existing = await github.rest.repos.getContent({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  path: repoPath,
                  ref: branchName,
                });

                if (!Array.isArray(existing.data) && existing.data.sha) {
                  sha = existing.data.sha;
                }
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
              }

              await github.rest.repos.createOrUpdateFileContents({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: repoPath,
                message,
                content: fileContent.toString('base64'),
                sha,
                branch: branchName,
              });
            }

            await upsertFile(
              csvRepoPath,
              csvContent,
              `Record deployment start for ${{ inputs.client }} ${{ inputs.module }} ${{ inputs.version }}`
            );

  record-deployment-end:
    name: Record deployment summary
    needs: [web-deploy, api-deploy, db-deploy, config-deploy]
    if: ${{ always() }}
    # Same CSV-write serialization lock as record-deployment-start.
    concurrency:
      group: csv-log-write
      cancel-in-progress: false
    runs-on: ${{ fromJSON((inputs.stage == 'QA' && '["self-hosted","QA02-Deployment"]') || (inputs.stage == 'UAT' && '["self-hosted","UAT-Deployment"]') || '["self-hosted","PROD-Deployment"]') }}
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout deployment logs branch
        uses: actions/checkout@v5
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: main
          fetch-depth: 0

      - name: Update deployment summary
        id: create_csv
        shell: powershell
        run: |
          $timestamp = (Get-Date).ToUniversalTime().ToString("yyyy-MM-dd HH:mm:ss 'UTC'")

          $results = @(
            '${{ needs.web-deploy.result }}',
            '${{ needs.api-deploy.result }}',
            '${{ needs.db-deploy.result }}',
            '${{ needs.config-deploy.result }}'
          ) | Where-Object { -not [string]::IsNullOrWhiteSpace($_) -and $_ -ne 'skipped' }

          if ($results.Count -eq 0) {
            $deploymentStatus = 'Skipped'
          } elseif ($results -contains 'failure') {
            $deploymentStatus = 'Failed'
          } elseif ($results -contains 'cancelled') {
            $deploymentStatus = 'Cancelled'
          } else {
            $deploymentStatus = 'Succeeded'
          }

          function Normalize-DeploymentRow {
            param([psobject]$Row)

            $properties = $Row.PSObject.Properties.Name
            $deploymentDateTime = if ($properties -contains 'DeploymentDateTime') { $Row.DeploymentDateTime } else { '' }
            [pscustomobject]@{
              Client = $Row.Client
              Application = $Row.Application
              Version = $Row.Version
              Environment = $Row.Environment
              DeploymentStatus = $Row.DeploymentStatus
              DeploymentStartDateTime = if ($properties -contains 'DeploymentStartDateTime' -and -not [string]::IsNullOrWhiteSpace($Row.DeploymentStartDateTime)) { $Row.DeploymentStartDateTime } elseif (-not [string]::IsNullOrWhiteSpace($deploymentDateTime)) { $deploymentDateTime } else { '' }
              DeploymentEndDateTime = if ($properties -contains 'DeploymentEndDateTime' -and -not [string]::IsNullOrWhiteSpace($Row.DeploymentEndDateTime)) { $Row.DeploymentEndDateTime } elseif (-not [string]::IsNullOrWhiteSpace($deploymentDateTime)) { $deploymentDateTime } else { '' }
              TriggeredBy = $Row.TriggeredBy
              ActionRunUrl = if ($properties -contains 'ActionRunUrl') { $Row.ActionRunUrl } else { '' }
            }
          }

          $record = [pscustomobject]@{
            Client = "${{ inputs.client }}"
            Application = "${{ inputs.module }}"
            Version = "${{ inputs.version }}"
            Environment = "${{ inputs.stage }}"
            DeploymentStatus = $deploymentStatus
            DeploymentStartDateTime = ''
            DeploymentEndDateTime = $timestamp
            TriggeredBy = if ("${{ inputs.triggered_by }}" -ne "") { "${{ inputs.triggered_by }}" } else { "${{ github.actor }}" }
            ActionRunUrl = "$env:GITHUB_SERVER_URL/$env:GITHUB_REPOSITORY/actions/runs/$env:GITHUB_RUN_ID"
          }

          $logDirectory = "DeploymentLogs"
          New-Item -ItemType Directory -Path $logDirectory -Force | Out-Null

          $csvPath = Join-Path $logDirectory 'DeploymentLogs.csv'

          $rows = @()
          if (Test-Path $csvPath) {
            $rows = @(Import-Csv $csvPath | ForEach-Object { Normalize-DeploymentRow $_ })
          }

          $recordKey = "${{ inputs.client }}|${{ inputs.module }}|${{ inputs.version }}|${{ inputs.stage }}"
          $existingIndex = -1

          for ($index = 0; $index -lt $rows.Count; $index++) {
            $existingKey = "$($rows[$index].Client)|$($rows[$index].Application)|$($rows[$index].Version)|$($rows[$index].Environment)"
            if ($existingKey -ieq $recordKey) {
              $existingIndex = $index
              break
            }
          }

          if ($existingIndex -ge 0) {
            $record.DeploymentStartDateTime = $rows[$existingIndex].DeploymentStartDateTime
            $rows[$existingIndex] = $record
          } else {
            $record.DeploymentStartDateTime = $timestamp
            $rows = @($record) + @($rows)
          }

          $rows |
            Select-Object Client, Application, Version, Environment, DeploymentStatus, DeploymentStartDateTime, DeploymentEndDateTime, TriggeredBy, ActionRunUrl |
            Export-Csv -Path $csvPath -NoTypeInformation

          Write-Host "Updated deployment summary in $csvPath"
          Get-Content $csvPath

          Add-Content $env:GITHUB_OUTPUT "csv_path=$csvPath"
          Add-Content $env:GITHUB_OUTPUT "deployment_status=$deploymentStatus"

      - name: Check in deployment summary CSV
        uses: actions/github-script@v7
        env:
          CSV_PATH: ${{ steps.create_csv.outputs.csv_path }}
          BRANCH_NAME: main
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const fs = require('fs');
            const path = require('path');

            const csvPath = process.env.CSV_PATH;
            const branchName = process.env.BRANCH_NAME;
            const csvContent = fs.readFileSync(csvPath);
            const csvRepoPath = path.posix.join('DeploymentLogs', 'DeploymentLogs.csv');

            async function upsertFile(repoPath, fileContent, message) {
              let sha;

              try {
                const existing = await github.rest.repos.getContent({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  path: repoPath,
                  ref: branchName,
                });

                if (!Array.isArray(existing.data) && existing.data.sha) {
                  sha = existing.data.sha;
                }
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
              }

              await github.rest.repos.createOrUpdateFileContents({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: repoPath,
                message,
                content: fileContent.toString('base64'),
                sha,
                branch: branchName,
              });
            }

            await upsertFile(
              csvRepoPath,
              csvContent,
              `Update deployment summary for ${{ inputs.client }} ${{ inputs.module }} ${{ inputs.version }}`
            );

      - name: Close deployment issue
        if: ${{ inputs.issue_number != '' }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueNumber = parseInt('${{ inputs.issue_number }}', 10);
            if (!issueNumber) return;
            const status = '${{ steps.create_csv.outputs.deployment_status }}';
            const statusEmoji = { Succeeded: ':white_check_mark:', Failed: ':x:', Cancelled: ':warning:', Skipped: ':fast_forward:' }[status] || ':grey_question:';
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${{ github.run_id }}`;
            const body = [
              `### Deployment ${statusEmoji} ${status}`,
              '',
              '| | |',
              '|---|---|',
              `| **Client** | ${{ inputs.client }} |`,
              `| **Module** | ${{ inputs.module }} |`,
              `| **Selected Version** | \`${{ inputs.version }}\` |`,
              `| **Version** | \`${{ inputs.version }}\` |`,
              `| **Stage** | ${{ inputs.stage }} |`,
              `| **Status** | **${status}** |`,
              `| **Run** | [View workflow run](${runUrl}) |`,
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              state: 'closed'
            });
            console.log('Commented and closed issue #' + issueNumber);

      - name: Upload deployment summary
        uses: actions/upload-artifact@v4
        with:
          name: deployment-summary-${{ inputs.client }}-${{ inputs.module }}-${{ inputs.version }}-${{ inputs.stage }}
          path: DeploymentLogs
          if-no-files-found: error
          retention-days: 363
