name: "Configuration JSON Handler"

on:
  workflow_dispatch:
    inputs:

      filePath:
        description: "JSON file path inside repository"
        required: true
        type: string

      content:
        description: "Updated JSON content"
        required: true
        type: string

      commitMessage:
        description: "Commit message"
        required: true
        type: string

      client:
        description: "Client name"
        required: false
        type: string

      environment:
        description: "Environment name"
        required: false
        type: string

      application:
        description: "Application name"
        required: false
        type: string

      updatedBy:
        description: "User who submitted the change"
        required: false
        type: string


permissions:
  contents: write
  actions: write


jobs:

  update-json-file:

    name: "Update Configuration JSON"

    runs-on: ubuntu-latest


    steps:

      - name: "Checkout repository"
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: "Commit JSON Changes"

        uses: actions/github-script@v7

        with:

          github-token: ${{ github.token }}

          script: |

            const filePath = '${{ inputs.filePath }}';
            const content = Buffer
              .from(`${{ inputs.content }}`)
              .toString('base64');
            const client = '${{ inputs.client }}' || '';
            const environment = '${{ inputs.environment }}' || '';
            const application = '${{ inputs.application }}' || '';
            const commitMessage = '${{ inputs.commitMessage }}' || 'Update configuration JSON';
            const updatedBy = '${{ inputs.updatedBy }}' || context.actor || 'unknown';
            const timestamp = new Date().toISOString();
            const workflowUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;

            let sha = undefined;

            try {

              const existingFile =
                await github.rest.repos.getContent({

                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  path: filePath,
                  ref: 'main'

                });

              sha = existingFile.data.sha;

            } catch(error) {

              core.setFailed(`File not found for update: ${filePath}`);
              return;

            }

            const commitResponse = await github.rest.repos.updateFileContents({

              owner: context.repo.owner,

              repo: context.repo.repo,

              path: filePath,

              message: commitMessage,

              content: content,

              sha: sha,

              branch: 'main'

            });

            const commitSha = commitResponse.data.commit.sha;

            const logFilePath = 'DeploymentLogs/ConfigurationLogs.csv';
            const headerLine = '"Timestamp","Client","Environment","Application","FilePath","UserId","CommitMessage","CommitSHA","WorkflowRunUrl"\n';
            const escapeCsv = (value = '') => `"${String(value).replace(/"/g, '""')}"`;
            const row = [
              timestamp,
              client,
              environment,
              application,
              filePath,
              updatedBy,
              commitMessage,
              commitSha,
              workflowUrl
            ].map(escapeCsv).join(',');

            let logSha = undefined;
            let csvContent = headerLine + row + '\n';

            try {
              const existingLogFile = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: logFilePath,
                ref: 'main'
              });

              logSha = existingLogFile.data.sha;
              const existingCsv = Buffer.from(existingLogFile.data.content, 'base64').toString('utf8');
              csvContent = existingCsv.trimEnd() + '\n' + row + '\n';
            } catch(error) {
              console.log("Creating new configuration log file");
            }

            await github.rest.repos.updateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: logFilePath,
              message: `${commitMessage} [audit log]`,
              content: Buffer.from(csvContent).toString('base64'),
              sha: logSha,
              branch: 'main'
            });

            console.log(`Updated: ${filePath}`);
            console.log(`Commit SHA: ${commitSha}`);



