name: "Configuration JSON Handler"

on:
  workflow_dispatch:
    inputs:

      filePath:
        description: "JSON file path inside repository"
        required: true
        type: string

      content:
        description: "Updated JSON content"
        required: true
        type: string

      commitMessage:
        description: "Commit message"
        required: true
        type: string

      client:
        description: "Client name"
        required: false
        type: string

      environment:
        description: "Environment name"
        required: false
        type: string

      application:
        description: "Application name"
        required: false
        type: string

      updatedBy:
        description: "User who submitted the change"
        required: false
        type: string


permissions:
  contents: write
  actions: write


jobs:

  update-json-file:

    name: "Update Configuration JSON"

    runs-on: ubuntu-latest


    steps:

      - name: "Checkout repository"
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: "Update JSON File"

        uses: actions/github-script@v7

        with:

          github-token: ${{ github.token }}

          script: |

            const filePath = '${{ inputs.filePath }}';
            const content = Buffer
              .from(`${{ inputs.content }}`)
              .toString('base64');
            const commitMessage = '${{ inputs.commitMessage }}' || 'Update configuration JSON';

            let sha = undefined;

            try {
              const existingFile = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: filePath,
                ref: 'main'
              });

              sha = existingFile.data.sha;
            } catch(error) {
              core.setFailed(`File not found for update: ${filePath}`);
              return;
            }

            const commitResponse = await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: filePath,
              message: commitMessage,
              content: content,
              sha: sha,
              branch: 'main'
            });

            core.setOutput('commitSha', commitResponse.data.commit.sha);
            core.setOutput('actualCommitMessage', commitResponse.data.commit.message || commitMessage);
            console.log(`Updated: ${filePath}`);
            console.log(`Commit SHA: ${commitResponse.data.commit.sha}`);

      - name: "Update CSV Log"

        uses: actions/github-script@v7

        with:

          github-token: ${{ github.token }}

          script: |

            const filePath = '${{ inputs.filePath }}';
            const pathParts = filePath.split('/').filter(Boolean);
            const clientFromPath = pathParts[1] || '';
            const environmentFromPath = pathParts[2] || '';
            const applicationFromPath = pathParts[3] || '';

            const client = clientFromPath || '${{ inputs.client }}' || '';
            const environment = environmentFromPath || '${{ inputs.environment }}' || '';
            const application = applicationFromPath || '${{ inputs.application }}' || '';
            const updatedBy = context.actor || '${{ inputs.updatedBy }}' || 'unknown';
            const timestamp = new Date().toISOString();
            const workflowUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const commitSha = '${{ steps.update-json-file.outputs.commitSha }}';
            const actualCommitMessage = '${{ steps.update-json-file.outputs.actualCommitMessage }}';

            const logFilePath = 'DeploymentLogs/ConfigurationLogs.csv';
            const headerLine = '"Timestamp","Client","Environment","Application","FilePath","UserId","CommitMessage","CommitSHA","WorkflowRunUrl"\n';
            const escapeCsv = (value = '') => `"${String(value).replace(/"/g, '""')}"`;
            const row = [
              timestamp,
              client,
              environment,
              application,
              filePath,
              updatedBy,
              actualCommitMessage,
              commitSha,
              workflowUrl
            ].map(escapeCsv).join(',');

            let logSha = undefined;
            let csvContent = headerLine + row + '\n';

            try {
              const existingLogFile = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: logFilePath,
                ref: 'main'
              });

              logSha = existingLogFile.data.sha;
              const existingCsv = Buffer.from(existingLogFile.data.content, 'base64').toString('utf8');
              csvContent = existingCsv.trimEnd() + '\n' + row + '\n';
            } catch(error) {
              console.log("Creating new configuration log file");
            }

            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: logFilePath,
              message: `${actualCommitMessage} [audit log]`,
              content: Buffer.from(csvContent).toString('base64'),
              sha: logSha,
              branch: 'main'
            });

            console.log(`CSV updated for: ${filePath}`);



