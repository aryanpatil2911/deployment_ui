name: "Release Screen YAML Handler"

on:
  workflow_dispatch:
    inputs:
      filePath:
        description: "YAML file path inside repository"
        required: true
        type: string

      content:
        description: "Updated YAML content"
        required: true
        type: string

      commitMessage:
        description: "Commit message"
        required: true
        type: string


permissions:
  contents: write
  actions: write


jobs:
  update-release-yaml:

    name: "Update Release YAML"

    runs-on: ubuntu-latest


    steps:

      - name: "Commit YAML Changes"
        uses: actions/github-script@v7

        with:

          github-token: ${{ github.token }}

          script: |

            const path = '${{ inputs.filePath }}';

            const content = Buffer
              .from(`${{ inputs.content }}`)
              .toString('base64');


            let sha = undefined;


            try {

              const existingFile =
                await github.rest.repos.getContent({

                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  path: path,
                  ref: 'main'

                });


              sha = existingFile.data.sha;


            } catch(error) {

              console.log("Creating new YAML file");

            }


            await github.rest.repos.createOrUpdateFileContents({

              owner: context.repo.owner,

              repo: context.repo.repo,

              path: path,

              message: '${{ inputs.commitMessage }}',

              content: content,

              sha: sha,

              branch: 'main'

            });


            console.log(`Updated: ${path}`);



      - name: "Trigger Index Update"
        uses: actions/github-script@v7

        with:

          github-token: ${{ github.token }}

          script: |

            await github.rest.actions.createWorkflowDispatch({

              owner: context.repo.owner,

              repo: context.repo.repo,

              workflow_id: 'update-releases-index.yml',

              ref: 'main'

            });
