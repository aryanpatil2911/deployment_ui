name: Deploy DB

on:  
  workflow_dispatch:
    inputs:
      client:
        description: 'Client name'
        required: true
        type: choice
        options:
          - QA
          - BAIN
          - DKCM
          - MASH
          - KLIM
          - MPCM
          - MTEU
          - QRMO
          - DEMO
      application:
        description: 'Application name (example: Recon)'
        required: true
        default: GRM
        type: string
      version:
        description: 'Application package version (example: 2.26.0428.92)'
        required: true
        default: 2.26.0428.92
        type: string
      stage:
        description: 'Target environment'
        required: true
        default: QA
        type: choice
        options:
          - QA
          - UAT
          - PROD
      component:
        description: 'DB component key from config'
        required: true
        default: db
        type: string
  workflow_call:
    inputs:
      client:
        description: 'Client name'
        required: true
        type: string
      application:
        description: 'Application name (example: GRM)'
        required: true
        default: GRM
        type: string
      version:
        description: 'Application package version (example: 2.26.0428.92)'
        required: true
        default: 2.26.0428.92
        type: string
      stage:
        description: 'Target environment'
        required: true
        default: QA
        type: string
      component:
        description: 'DB component key from config'
        required: true
        default: db
        type: string

permissions:
  contents: read

jobs:
  read-config:
    runs-on: windows-latest
    outputs:
      application_name: ${{ steps.cfg.outputs.application_name }}
      package_name: ${{ steps.cfg.outputs.package_name }}
      package_source_root: ${{ steps.cfg.outputs.package_source_root }}
      extracted_package_root: ${{ steps.cfg.outputs.extracted_package_root }}
      deployment_script_path: ${{ steps.cfg.outputs.deployment_script_path }}
      db_server: ${{ steps.cfg.outputs.db_server }}
      db_name: ${{ steps.cfg.outputs.db_name }}
      db_authentication: ${{ steps.cfg.outputs.db_authentication }}
      sql_scripts_pattern: ${{ steps.cfg.outputs.sql_scripts_pattern }}
      display_sql_output: ${{ steps.cfg.outputs.display_sql_output }}
      trust_server_certificate: ${{ steps.cfg.outputs.trust_server_certificate }}
      github_runner: ${{ steps.cfg.outputs.github_runner }}
      target_server: ${{ steps.cfg.outputs.target_server }}
      winrm_username: ${{ steps.cfg.outputs.winrm_username }}
      config_replacements_enabled: ${{ steps.cfg.outputs.config_replacements_enabled }}
      config_replacement_file_patterns: ${{ steps.cfg.outputs.config_replacement_file_patterns }}
      config_replacement_tokens: ${{ steps.cfg.outputs.config_replacement_tokens }}
      failed_scripts_root: ${{ steps.cfg.outputs.failed_scripts_root }}
      ssrs_enabled: ${{ steps.cfg.outputs.ssrs_enabled }}
      ssrs_report_package: ${{ steps.cfg.outputs.ssrs_report_package }}
      ssrs_report_package_source_root: ${{ steps.cfg.outputs.ssrs_report_package_source_root }}
      ssrs_extract_root: ${{ steps.cfg.outputs.ssrs_extract_root }}
      ssrs_report_service_url: ${{ steps.cfg.outputs.ssrs_report_service_url }}
      ssrs_report_execution_url: ${{ steps.cfg.outputs.ssrs_report_execution_url }}
      ssrs_report_folder: ${{ steps.cfg.outputs.ssrs_report_folder }}
      ssrs_datasource_folder: ${{ steps.cfg.outputs.ssrs_datasource_folder }}
      ssrs_dataset_folder: ${{ steps.cfg.outputs.ssrs_dataset_folder }}
      ssrs_parts_folder: ${{ steps.cfg.outputs.ssrs_parts_folder }}
      ssrs_root_folder: ${{ steps.cfg.outputs.ssrs_root_folder }}
      ssrs_backup_location: ${{ steps.cfg.outputs.ssrs_backup_location }}
      ssrs_overwrite_data_sources: ${{ steps.cfg.outputs.ssrs_overwrite_data_sources }}
      ssrs_clear_report_folder: ${{ steps.cfg.outputs.ssrs_clear_report_folder }}
      ssrs_use_archive_structure: ${{ steps.cfg.outputs.ssrs_use_archive_structure }}
      ssrs_fail_on_unresolved_references: ${{ steps.cfg.outputs.ssrs_fail_on_unresolved_references }}
      ssrs_service_user_name: ${{ steps.cfg.outputs.ssrs_service_user_name }}
      target_server_role: ${{ steps.cfg.outputs.target_server_role }}
    steps:
      - uses: actions/checkout@v5

      - name: Read database package and environment config
        id: cfg
        shell: powershell
        run: |
          $application = "${{ inputs.application }}".Trim()
          $version = "${{ inputs.version }}".Trim()
          $stage = "${{ inputs.stage }}".Trim().ToUpperInvariant()
          $client = "${{ inputs.client }}".Trim()
          $component = "${{ inputs.component }}".Trim()

          if ([string]::IsNullOrWhiteSpace($application)) {
            Write-Error "Application is required"
            exit 1
          }

          if ([string]::IsNullOrWhiteSpace($version)) {
            Write-Error "Version is required"
            exit 1
          }

          if ([string]::IsNullOrWhiteSpace($component)) {
            Write-Error "Component is required"
            exit 1
          }

          $applicationFolder = Get-ChildItem -Path "App" -Directory |
            Where-Object { $_.Name -ieq $application } |
            Select-Object -First 1

          if ($null -eq $applicationFolder) {
            Write-Error "Application folder not found under App: $application"
            exit 1
          }

          $applicationName = $applicationFolder.Name
          $manifestName = "{0}_{1}.yml" -f $applicationFolder.Name, $version
          $manifestPath = Join-Path $applicationFolder.FullName $manifestName

          if (-not (Test-Path $manifestPath)) {
            Write-Host "Available manifests under $($applicationFolder.FullName):"
            Get-ChildItem -Path $applicationFolder.FullName -Filter "*.yml" -File |
              ForEach-Object { Write-Host " - $($_.Name)" }

            Write-Error "Application package manifest not found: $manifestPath"
            exit 1
          }

          $manifestLines = Get-Content $manifestPath
          $packageName = $null
          $packageSourceRoot = $null
          $reportPackage = $null
          $reportPackageSourceRoot = $null
          $resolvedConfigKey = $null
          $clientCodeSelector = $client

          $targetType = "database"
          $currentType = $null
          $currentConfiguration = $null
          $currentClientCode = $null
          $currentPackage = $null
          $currentPath = $null
          $currentReportPackage = $null
          $currentReportPath = $null
          $newFormatSeen = $false

          foreach ($line in $manifestLines) {
            if ($line -match '^\s+-\s+type:\s*(api|database|web)\s*$') {
              if ($newFormatSeen -and $currentType -ieq $targetType) {
                $isConfigMatch = -not [string]::IsNullOrWhiteSpace($currentConfiguration) -and ($currentConfiguration -ieq $component)
                $entryClientCode = if ([string]::IsNullOrWhiteSpace($currentClientCode)) { "Base" } else { $currentClientCode }
                if ($isConfigMatch -and
                    -not [string]::IsNullOrWhiteSpace($currentPackage) -and
                    -not [string]::IsNullOrWhiteSpace($currentPath) -and
                    (
                      $entryClientCode -ieq $clientCodeSelector -or
                      ($entryClientCode -ieq "Base" -and [string]::IsNullOrWhiteSpace($packageName))
                    )) {
                  $packageName = $currentPackage
                  $packageSourceRoot = $currentPath
                  $reportPackage = $currentReportPackage
                  $reportPackageSourceRoot = $currentReportPath
                  $resolvedConfigKey = if ([string]::IsNullOrWhiteSpace($currentConfiguration)) { $component } else { $currentConfiguration }
                }
              }

              $newFormatSeen = $true
              $currentType = $matches[1]
              $currentConfiguration = $null
              $currentClientCode = $null
              $currentPackage = $null
              $currentPath = $null
              $currentReportPackage = $null
              $currentReportPath = $null
              continue
            }

            if ($newFormatSeen -and $line -match '^\s+component:\s*(.+?)\s*$') {
              $currentConfiguration = $matches[1].Trim().Trim("'").Trim('"')
              continue
            }

            if ($newFormatSeen -and $line -match '^\s+client_code:\s*(.+?)\s*$') {
              $currentClientCode = $matches[1].Trim().Trim("'").Trim('"')
              continue
            }

            if ($newFormatSeen -and $line -match '^\s+package:\s*(.+?)\s*$') {
              $currentPackage = $matches[1].Trim().Trim("'").Trim('"')
              continue
            }

            if ($newFormatSeen -and $line -match '^\s+path:\s*(.+?)\s*$') {
              $currentPath = $matches[1].Trim().Trim("'").Trim('"')
              continue
            }

            if ($newFormatSeen -and $line -match '^\s+report_package:\s*(.+?)\s*$') {
              $currentReportPackage = $matches[1].Trim().Trim("'").Trim('"')
              continue
            }

            if ($newFormatSeen -and $line -match '^\s+report_path:\s*(.+?)\s*$') {
              $currentReportPath = $matches[1].Trim().Trim("'").Trim('"')
              continue
            }
          }

          if ($newFormatSeen -and $currentType -ieq $targetType) {
            $isConfigMatch = -not [string]::IsNullOrWhiteSpace($currentConfiguration) -and ($currentConfiguration -ieq $component)
            $entryClientCode = if ([string]::IsNullOrWhiteSpace($currentClientCode)) { "Base" } else { $currentClientCode }
            if ($isConfigMatch -and
                -not [string]::IsNullOrWhiteSpace($currentPackage) -and
                -not [string]::IsNullOrWhiteSpace($currentPath) -and
                (
                  $entryClientCode -ieq $clientCodeSelector -or
                  ($entryClientCode -ieq "Base" -and [string]::IsNullOrWhiteSpace($packageName))
                )) {
              $packageName = $currentPackage
              $packageSourceRoot = $currentPath
              $reportPackage = $currentReportPackage
              $reportPackageSourceRoot = $currentReportPath
              $resolvedConfigKey = if ([string]::IsNullOrWhiteSpace($currentConfiguration)) { $component } else { $currentConfiguration }
            }
          }

          if ([string]::IsNullOrWhiteSpace($packageName) -or [string]::IsNullOrWhiteSpace($packageSourceRoot)) {
            $manifestComponent = if ($component -ieq "db") { "database" } else { $component }
            $inComponent = $false
            foreach ($line in $manifestLines) {
              if ($line -match '^\s+([^:\s]+):\s*$') {
                $key = $matches[1]
                $inComponent = ($key -ieq $manifestComponent)
                if ($inComponent -and [string]::IsNullOrWhiteSpace($resolvedConfigKey)) {
                  $resolvedConfigKey = $key
                }
                continue
              }

              if ($inComponent -and $line -match '^\s+package:\s*(.+?)\s*$') {
                $packageName = $matches[1].Trim().Trim("'").Trim('"')
                continue
              }

              if ($inComponent -and $line -match '^\s+path:\s*(.+?)\s*$') {
                $packageSourceRoot = $matches[1].Trim().Trim("'").Trim('"')
                continue
              }

              if ($inComponent -and $line -match '^\s+report_package:\s*(.+?)\s*$') {
                $reportPackage = $matches[1].Trim().Trim("'").Trim('"')
                continue
              }

              if ($inComponent -and $line -match '^\s+report_path:\s*(.+?)\s*$') {
                $reportPackageSourceRoot = $matches[1].Trim().Trim("'").Trim('"')
                continue
              }
            }
          }

          if ([string]::IsNullOrWhiteSpace($packageName)) {
            Write-Error "Package not found for component/configuration '$component' in manifest: $manifestPath"
            exit 1
          }

          if ([string]::IsNullOrWhiteSpace($packageSourceRoot)) {
            Write-Error "Package path not found for component/configuration '$component' in manifest: $manifestPath"
            exit 1
          }

          $configCandidates = @(
            (Join-Path (Join-Path (Join-Path (Join-Path "Client" $client) $stage) $applicationName) "deployment.json"),
            (Join-Path (Join-Path (Join-Path "Client" $client) $applicationName) "deployment.json"),
            (Join-Path (Join-Path (Join-Path "Client" $client) $stage) "$applicationName.json")
          )

          $configPath = $configCandidates |
            Where-Object { Test-Path $_ } |
            Select-Object -First 1

          if ([string]::IsNullOrWhiteSpace($configPath) -or -not (Test-Path $configPath)) {
            Write-Error "Client config not found. Checked: $($configCandidates -join ', ')"
            exit 1
          }

          $config = Get-Content $configPath -Raw | ConvertFrom-Json
          $applicationProperty = $config.PSObject.Properties |
            Where-Object { $_.Name -ieq $applicationName } |
            Select-Object -First 1

          if ($null -eq $applicationProperty) {
            Write-Error "Application '$applicationName' not found in config: $configPath"
            exit 1
          }

          $applicationConfig = $applicationProperty.Value
          $configKey = if ([string]::IsNullOrWhiteSpace($resolvedConfigKey)) { $component } else { $resolvedConfigKey }
          $componentProperty = $applicationConfig.PSObject.Properties |
            Where-Object { $_.Name -ieq $configKey } |
            Select-Object -First 1

          if ($null -eq $componentProperty -and ($component -ieq "db" -or $component -ieq "database")) {
            $componentProperty = $applicationConfig.PSObject.Properties |
              Where-Object { $_.Name -match '^(db|database)$' } |
              Select-Object -First 1
          }

          # Fall back: search all other top-level keys in deployment.json
          if ($null -eq $componentProperty) {
            foreach ($appProp in $config.PSObject.Properties) {
              if ($appProp.Name -ieq $applicationName) { continue }
              $componentProperty = $appProp.Value.PSObject.Properties |
                Where-Object { $_.Name -ieq $configKey } |
                Select-Object -First 1
              if ($null -ne $componentProperty) {
                Write-Host "Component '$configKey' found under top-level key '$($appProp.Name)'"
                break
              }
            }
          }

          if ($null -eq $componentProperty) {
            Write-Error "Component/configuration '$configKey' not found in config: $configPath"
            exit 1
          }

          $envConfig = $componentProperty.Value
          if ($null -eq $envConfig.PSObject.Properties["github_runner"]) {
            Write-Error "github_runner is required for application '$($applicationProperty.Name)' component '$($componentProperty.Name)' in config: $configPath"
            exit 1
          }

          if ($envConfig.PSObject.Properties.Name -contains 'ssrs_report_package') {
            $reportPackage = $envConfig.ssrs_report_package
          }

          if ($envConfig.PSObject.Properties.Name -contains 'package_source_root') {
            $packageSourceRoot = $envConfig.package_source_root
          }

          if ($envConfig.PSObject.Properties.Name -contains 'ssrs_report_package_source_root') {
            $reportPackageSourceRoot = $envConfig.ssrs_report_package_source_root
          }

          if ([string]::IsNullOrWhiteSpace($reportPackageSourceRoot)) {
            $reportPackageSourceRoot = $packageSourceRoot
          }

          $ssrsEnabled = if ($envConfig.PSObject.Properties.Name -contains 'ssrs_enabled' -and "$($envConfig.ssrs_enabled)" -ieq "true") {
            "true"
          } else {
            "false"
          }

          $configReplacementsEnabled = "false"
          $configReplacementFilePatterns = ""
          $configReplacementTokens = "{}"
          $mergedTokens = [ordered]@{}
          $failedScriptsRoot = ""
          $replacementCandidates = @(
            (Join-Path (Join-Path (Join-Path (Join-Path "Client" $client) $stage) $applicationName) "config-replacements.json"),
            (Join-Path (Join-Path (Join-Path "Client" $client) $applicationName) "config-replacements.json")
          )

          $replacementPath = $replacementCandidates |
            Where-Object { Test-Path $_ } |
            Select-Object -First 1

          if (-not [string]::IsNullOrWhiteSpace($replacementPath)) {
            $replacementConfig = Get-Content $replacementPath -Raw | ConvertFrom-Json
            $replacementApplicationProperty = $replacementConfig.PSObject.Properties |
              Where-Object { $_.Name -ieq $applicationProperty.Name } |
              Select-Object -First 1

            if ($null -ne $replacementApplicationProperty) {
              # Always merge shared_tokens for deployment_script_path resolution, regardless of component enablement
              $sharedTokensProp = $replacementApplicationProperty.Value.PSObject.Properties["shared_tokens"]
              if ($null -ne $sharedTokensProp) {
                $failedScriptsProp = $sharedTokensProp.Value.PSObject.Properties["DatabaseFailedScripts"]
                if ($null -ne $failedScriptsProp -and -not [string]::IsNullOrWhiteSpace([string]$failedScriptsProp.Value)) {
                  $failedScriptsRoot = [string]$failedScriptsProp.Value
                }

                foreach ($p in $sharedTokensProp.Value.PSObject.Properties) { $mergedTokens[$p.Name] = $p.Value }
              }

              # Always resolve deployment_script_path tokens if they exist and we have shared_tokens
              if ($envConfig.PSObject.Properties.Name -contains 'deployment_script_path' -and $mergedTokens.Count -gt 0) {
                $resolvedDeploymentScriptPath = $envConfig.deployment_script_path
                foreach ($token in $mergedTokens.GetEnumerator()) {
                  $tokenPattern = "#\{" + [regex]::Escape([string]$token.Key) + "\}"
                  if ([regex]::IsMatch($resolvedDeploymentScriptPath, $tokenPattern, [System.Text.RegularExpressions.RegexOptions]::IgnoreCase)) {
                    $resolvedDeploymentScriptPath = [regex]::Replace(
                      $resolvedDeploymentScriptPath,
                      $tokenPattern,
                      [System.Text.RegularExpressions.MatchEvaluator]{ param($m) [string]$token.Value },
                      [System.Text.RegularExpressions.RegexOptions]::IgnoreCase
                    )
                  }
                }
                $envConfig.deployment_script_path = $resolvedDeploymentScriptPath
              }

              $replacementComponentProperty = $replacementApplicationProperty.Value.PSObject.Properties |
                Where-Object { $_.Name -ieq $componentProperty.Name } |
                Select-Object -First 1

              if ($null -ne $replacementComponentProperty) {
                $replacementItem = $replacementComponentProperty.Value
                $isEnabled = ($replacementItem.PSObject.Properties["enabled"] -and "$($replacementItem.enabled)" -ieq "true")

                # Merge component tokens (component-level overrides shared)
                if ($null -ne $replacementItem.PSObject.Properties["tokens"]) {
                  foreach ($p in $replacementItem.tokens.PSObject.Properties) { $mergedTokens[$p.Name] = $p.Value }
                }

                if ($isEnabled -and $mergedTokens.Count -gt 0) {
                  $patterns = @($replacementItem.file_patterns) |
                    Where-Object { -not [string]::IsNullOrWhiteSpace($_) }

                  if ($patterns.Count -eq 0) {
                    $patterns = @("*.sql")
                  }

                  $configReplacementsEnabled = "true"
                  $configReplacementFilePatterns = $patterns -join "`n"
                  $configReplacementTokens = [pscustomobject]$mergedTokens | ConvertTo-Json -Depth 20 -Compress
                }
              }
            }
          }

          # Always output merged tokens (shared + component) so reusable-db-deploy has access for deployment_script_path resolution
          if ($mergedTokens.Count -gt 0 -and ([string]::IsNullOrWhiteSpace($configReplacementTokens) -or $configReplacementTokens -eq "{}")) {
            $configReplacementTokens = [pscustomobject]$mergedTokens | ConvertTo-Json -Depth 20 -Compress
          }

          if ([string]::IsNullOrWhiteSpace($failedScriptsRoot) -and $mergedTokens.Contains("DatabaseFailedScripts")) {
            $failedScriptsRoot = [string]$mergedTokens["DatabaseFailedScripts"]
          }

          Write-Host "Resolved DatabaseFailedScripts root: $failedScriptsRoot"

          $githubRunner = @($envConfig.github_runner) | ConvertTo-Json -Compress

          Add-Content $env:GITHUB_OUTPUT "package_name=$packageName"
          Add-Content $env:GITHUB_OUTPUT "application_name=$($applicationProperty.Name)"
          Add-Content $env:GITHUB_OUTPUT "package_source_root=$packageSourceRoot"
          Add-Content $env:GITHUB_OUTPUT "extracted_package_root=$($envConfig.extracted_package_root)"
          Add-Content $env:GITHUB_OUTPUT "deployment_script_path=$($envConfig.deployment_script_path)"
          Add-Content $env:GITHUB_OUTPUT "db_server=$($envConfig.db_server)"
          Add-Content $env:GITHUB_OUTPUT "db_name=$($envConfig.db_name)"
          Add-Content $env:GITHUB_OUTPUT "db_authentication=$($envConfig.db_authentication)"
          Add-Content $env:GITHUB_OUTPUT "display_sql_output=$($envConfig.display_sql_output)"
          Add-Content $env:GITHUB_OUTPUT "trust_server_certificate=$($envConfig.trust_server_certificate)"
          Add-Content $env:GITHUB_OUTPUT "github_runner=$githubRunner"
          Add-Content $env:GITHUB_OUTPUT "target_server=$($envConfig.target_server)"
          Add-Content $env:GITHUB_OUTPUT "winrm_username=$($envConfig.winrm_username)"
          Add-Content $env:GITHUB_OUTPUT "target_server_role=$($envConfig.target_server_role)"
          Add-Content $env:GITHUB_OUTPUT "failed_scripts_root=$failedScriptsRoot"
          Add-Content $env:GITHUB_OUTPUT "config_replacements_enabled=$configReplacementsEnabled"
          Add-Content $env:GITHUB_OUTPUT "config_replacement_tokens=$configReplacementTokens"
          Add-Content $env:GITHUB_OUTPUT "config_replacement_file_patterns<<EOF"
          Add-Content $env:GITHUB_OUTPUT $configReplacementFilePatterns
          Add-Content $env:GITHUB_OUTPUT "EOF"
          Add-Content $env:GITHUB_OUTPUT "ssrs_enabled=$ssrsEnabled"
          Add-Content $env:GITHUB_OUTPUT "ssrs_report_package=$reportPackage"
          Add-Content $env:GITHUB_OUTPUT "ssrs_report_package_source_root=$reportPackageSourceRoot"
          Add-Content $env:GITHUB_OUTPUT "ssrs_extract_root=$($envConfig.ssrs_extract_root)"
          Add-Content $env:GITHUB_OUTPUT "ssrs_report_service_url=$($envConfig.ssrs_report_service_url)"
          Add-Content $env:GITHUB_OUTPUT "ssrs_report_execution_url=$($envConfig.ssrs_report_execution_url)"
          Add-Content $env:GITHUB_OUTPUT "ssrs_report_folder=$($envConfig.ssrs_report_folder)"
          Add-Content $env:GITHUB_OUTPUT "ssrs_datasource_folder=$($envConfig.ssrs_datasource_folder)"
          Add-Content $env:GITHUB_OUTPUT "ssrs_dataset_folder=$($envConfig.ssrs_dataset_folder)"
          Add-Content $env:GITHUB_OUTPUT "ssrs_parts_folder=$($envConfig.ssrs_parts_folder)"
          Add-Content $env:GITHUB_OUTPUT "ssrs_root_folder=$($envConfig.ssrs_root_folder)"
          Add-Content $env:GITHUB_OUTPUT "ssrs_backup_location=$($envConfig.ssrs_backup_location)"
          Add-Content $env:GITHUB_OUTPUT "ssrs_overwrite_data_sources=$($envConfig.ssrs_overwrite_data_sources)"
          Add-Content $env:GITHUB_OUTPUT "ssrs_clear_report_folder=$($envConfig.ssrs_clear_report_folder)"
          Add-Content $env:GITHUB_OUTPUT "ssrs_use_archive_structure=$($envConfig.ssrs_use_archive_structure)"
          Add-Content $env:GITHUB_OUTPUT "ssrs_fail_on_unresolved_references=$($envConfig.ssrs_fail_on_unresolved_references)"
          Add-Content $env:GITHUB_OUTPUT "ssrs_service_user_name=$($envConfig.ssrs_service_user_name)"

          $sqlPatterns = @($envConfig.sql_scripts_pattern) -join "`n"
          Add-Content $env:GITHUB_OUTPUT "sql_scripts_pattern<<EOF"
          Add-Content $env:GITHUB_OUTPUT $sqlPatterns
          Add-Content $env:GITHUB_OUTPUT "EOF"

          Write-Host "Application: $($applicationProperty.Name)"
          Write-Host "Component: $($componentProperty.Name)"
          Write-Host "Configuration Key: $configKey"
          Write-Host "Package: $packageName"
          Write-Host "Package Source Root: $packageSourceRoot"
          Write-Host "Client Config: $configPath"
          Write-Host "GitHub Runner: $githubRunner"
          Write-Host "Database: $($envConfig.db_name)"
          Write-Host "Server: $($envConfig.db_server)"
          Write-Host "Config Replacements Enabled: $configReplacementsEnabled"
          Write-Host "SSRS Enabled: $ssrsEnabled"

  deploy-qa:
    needs: read-config
    if: ${{ inputs.stage == 'QA' }}
    uses: ./.github/workflows/reusable-db-deploy.yml
    with:
      application_name: ${{ needs.read-config.outputs.application_name }}
      stage: ${{ inputs.stage }}
      client: ${{ inputs.client }}
      package_name: ${{ needs.read-config.outputs.package_name }}
      package_source_root: ${{ needs.read-config.outputs.package_source_root }}
      extracted_package_root: ${{ needs.read-config.outputs.extracted_package_root }}
      deployment_script_path: ${{ needs.read-config.outputs.deployment_script_path }}
      db_server: ${{ needs.read-config.outputs.db_server }}
      db_name: ${{ needs.read-config.outputs.db_name }}
      db_authentication: ${{ needs.read-config.outputs.db_authentication }}
      sql_scripts_pattern: ${{ needs.read-config.outputs.sql_scripts_pattern }}
      display_sql_output: ${{ needs.read-config.outputs.display_sql_output }}
      trust_server_certificate: ${{ needs.read-config.outputs.trust_server_certificate }}
      github_runner: ${{ needs.read-config.outputs.github_runner }}
      config_replacements_enabled: ${{ needs.read-config.outputs.config_replacements_enabled }}
      config_replacement_file_patterns: ${{ needs.read-config.outputs.config_replacement_file_patterns }}
      config_replacement_tokens: ${{ needs.read-config.outputs.config_replacement_tokens }}
      failed_scripts_root: ${{ needs.read-config.outputs.failed_scripts_root }}
      ssrs_enabled: ${{ needs.read-config.outputs.ssrs_enabled }}
      ssrs_report_package: ${{ needs.read-config.outputs.ssrs_report_package }}
      ssrs_report_package_source_root: ${{ needs.read-config.outputs.ssrs_report_package_source_root }}
      ssrs_extract_root: ${{ needs.read-config.outputs.ssrs_extract_root }}
      ssrs_report_service_url: ${{ needs.read-config.outputs.ssrs_report_service_url }}
      ssrs_report_execution_url: ${{ needs.read-config.outputs.ssrs_report_execution_url }}
      ssrs_report_folder: ${{ needs.read-config.outputs.ssrs_report_folder }}
      ssrs_datasource_folder: ${{ needs.read-config.outputs.ssrs_datasource_folder }}
      ssrs_dataset_folder: ${{ needs.read-config.outputs.ssrs_dataset_folder }}
      ssrs_parts_folder: ${{ needs.read-config.outputs.ssrs_parts_folder }}
      ssrs_root_folder: ${{ needs.read-config.outputs.ssrs_root_folder }}
      ssrs_backup_location: ${{ needs.read-config.outputs.ssrs_backup_location }}
      ssrs_overwrite_data_sources: ${{ needs.read-config.outputs.ssrs_overwrite_data_sources }}
