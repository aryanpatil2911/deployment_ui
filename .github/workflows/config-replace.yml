name: Config Replace

on:
  workflow_dispatch:
    inputs:
      client:
        description: 'Client name'
        required: true
        type: choice
        options:
          - QA
          - BAIN
          - DKCM
          - MASH
          - KLIM
          - MPCM
          - MTEU
          - QRMO
          - DEMO
      application:
        description: 'Application name (example: Recon)'
        required: true
        default: Recon
        type: string
      version:
        description: 'Application package version. Required for DB components.'
        required: false
        default: ''
        type: string
      stage:
        description: 'Target environment'
        required: true
        default: QA
        type: choice
        options:
          - QA
          - UAT
          - PROD
      component:
        description: 'Component key from deployment/config replacement JSON'
        required: true
        default: web
        type: string

permissions:
  contents: read

jobs:
  read-config:
    runs-on: windows-latest
    outputs:
      application_name: ${{ steps.cfg.outputs.application_name }}
      component_name: ${{ steps.cfg.outputs.component_name }}
      target_type: ${{ steps.cfg.outputs.target_type }}
      deploy_path: ${{ steps.cfg.outputs.deploy_path }}
      package_name: ${{ steps.cfg.outputs.package_name }}
      package_source_root: ${{ steps.cfg.outputs.package_source_root }}
      extracted_package_root: ${{ steps.cfg.outputs.extracted_package_root }}
      package_version: ${{ steps.cfg.outputs.package_version }}
      github_runner: ${{ steps.cfg.outputs.github_runner }}
      config_replacement_file_patterns: ${{ steps.cfg.outputs.config_replacement_file_patterns }}
      config_replacement_tokens: ${{ steps.cfg.outputs.config_replacement_tokens }}
    steps:
      - uses: actions/checkout@v5

      - name: Read deployment and replacement config
        id: cfg
        shell: powershell
        run: |
          $client = "${{ inputs.client }}".Trim()
          $stage = "${{ inputs.stage }}".Trim().ToUpperInvariant()
          $application = "${{ inputs.application }}".Trim()
          $version = "${{ inputs.version }}".Trim()
          $component = "${{ inputs.component }}".Trim()

          if ([string]::IsNullOrWhiteSpace($client)) {
            Write-Error "Client is required"
            exit 1
          }

          if ([string]::IsNullOrWhiteSpace($application)) {
            Write-Error "Application is required"
            exit 1
          }

          if ([string]::IsNullOrWhiteSpace($component)) {
            Write-Error "Component is required"
            exit 1
          }

          $applicationFolder = Get-ChildItem -Path "App" -Directory |
            Where-Object { $_.Name -ieq $application } |
            Select-Object -First 1

          if ($null -eq $applicationFolder) {
            Write-Error "Application folder not found under App: $application"
            exit 1
          }

          $applicationName = $applicationFolder.Name
          $configCandidates = @(
            (Join-Path (Join-Path (Join-Path (Join-Path "Client" $client) $stage) $applicationName) "deployment.json"),
            (Join-Path (Join-Path (Join-Path "Client" $client) $applicationName) "deployment.json"),
            (Join-Path (Join-Path (Join-Path "Client" $client) $stage) "$applicationName.json")
          )

          $configPath = $configCandidates |
            Where-Object { Test-Path $_ } |
            Select-Object -First 1

          if ([string]::IsNullOrWhiteSpace($configPath) -or -not (Test-Path $configPath)) {
            Write-Error "Client config not found. Checked: $($configCandidates -join ', ')"
            exit 1
          }

          $config = Get-Content $configPath -Raw | ConvertFrom-Json
          $applicationProperty = $config.PSObject.Properties |
            Where-Object { $_.Name -ieq $applicationName } |
            Select-Object -First 1

          if ($null -eq $applicationProperty) {
            Write-Error "Application '$applicationName' not found in config: $configPath"
            exit 1
          }

          $applicationConfig = $applicationProperty.Value
          $componentProperty = $applicationConfig.PSObject.Properties |
            Where-Object { $_.Name -ieq $component } |
            Select-Object -First 1

          if ($null -eq $componentProperty -and $component -ieq "web") {
            $componentProperty = $applicationConfig.PSObject.Properties |
              Where-Object { $_.Name -match '(^web\d*$|_WEB\d*$)' } |
              Select-Object -First 1
          }

          if ($null -eq $componentProperty -and $component -ieq "api") {
            $componentProperty = $applicationConfig.PSObject.Properties |
              Where-Object { $_.Name -match '(^api\d*$|_API\d*$)' } |
              Select-Object -First 1
          }

          if ($null -eq $componentProperty -and ($component -ieq "db" -or $component -ieq "database")) {
            $componentProperty = $applicationConfig.PSObject.Properties |
              Where-Object { $_.Name -match '(^db$|^database$|_DATABASE$)' } |
              Select-Object -First 1
          }

          if ($null -eq $componentProperty) {
            Write-Error "Component '$component' not found under application '$($applicationProperty.Name)' in config: $configPath"
            exit 1
          }

          $envConfig = $componentProperty.Value
          if ($null -eq $envConfig.PSObject.Properties["github_runner"]) {
            Write-Error "github_runner is required for application '$($applicationProperty.Name)' component '$($componentProperty.Name)' in config: $configPath"
            exit 1
          }

          $isDatabaseComponent =
            $componentProperty.Name -match '(^db$|^database$|_DATABASE$)' -or
            $envConfig.PSObject.Properties.Name -contains 'extracted_package_root' -or
            $envConfig.PSObject.Properties.Name -contains 'deployment_script_path'

          $targetType = if ($isDatabaseComponent) { "database" } else { "iis" }
          $deployPath = ""
          $packageName = ""
          $packageSourceRoot = ""
          $extractedPackageRoot = ""
          $clientCodeSelector = $client

          if ($isDatabaseComponent) {
            if ([string]::IsNullOrWhiteSpace($version)) {
              Write-Error "Version is required for manual DB config replacement."
              exit 1
            }

            $manifestName = "{0}_{1}.yml" -f $applicationFolder.Name, $version
            $manifestPath = Join-Path $applicationFolder.FullName $manifestName

            if (-not (Test-Path $manifestPath)) {
              Write-Host "Available manifests under $($applicationFolder.FullName):"
              Get-ChildItem -Path $applicationFolder.FullName -Filter "*.yml" -File |
                ForEach-Object { Write-Host " - $($_.Name)" }

              Write-Error "Application package manifest not found: $manifestPath"
              exit 1
            }

            $manifestLines = Get-Content $manifestPath
            $currentType = $null
            $currentConfiguration = $null
            $currentClientCode = $null
            $currentPackage = $null
            $currentPath = $null
            $newFormatSeen = $false

            foreach ($line in $manifestLines) {
              if ($line -match '^\s+-\s+type:\s*(api|database|web)\s*$') {
                if ($newFormatSeen -and $currentType -ieq "database") {
                  $isConfigMatch = -not [string]::IsNullOrWhiteSpace($currentConfiguration) -and ($currentConfiguration -ieq $componentProperty.Name)
                  $entryClientCode = if ([string]::IsNullOrWhiteSpace($currentClientCode)) { "Base" } else { $currentClientCode }
                  if ($isConfigMatch -and
                      -not [string]::IsNullOrWhiteSpace($currentPackage) -and
                      -not [string]::IsNullOrWhiteSpace($currentPath) -and
                      (
                        $entryClientCode -ieq $clientCodeSelector -or
                        ($entryClientCode -ieq "Base" -and [string]::IsNullOrWhiteSpace($packageName))
                      )) {
                    $packageName = $currentPackage
                    $packageSourceRoot = $currentPath
                  }
                }

                $newFormatSeen = $true
                $currentType = $matches[1]
                $currentConfiguration = $null
                $currentClientCode = $null
                $currentPackage = $null
                $currentPath = $null
                continue
              }

              if ($newFormatSeen -and $line -match '^\s+component:\s*(.+?)\s*$') {
                $currentConfiguration = $matches[1].Trim().Trim("'").Trim('"')
                continue
              }

              if ($newFormatSeen -and $line -match '^\s+client_code:\s*(.+?)\s*$') {
                $currentClientCode = $matches[1].Trim().Trim("'").Trim('"')
                continue
              }

              if ($newFormatSeen -and $line -match '^\s+package:\s*(.+?)\s*$') {
                $currentPackage = $matches[1].Trim().Trim("'").Trim('"')
                continue
              }

              if ($newFormatSeen -and $line -match '^\s+path:\s*(.+?)\s*$') {
                $currentPath = $matches[1].Trim().Trim("'").Trim('"')
                continue
              }
            }

            if ($newFormatSeen -and $currentType -ieq "database") {
              $isConfigMatch = -not [string]::IsNullOrWhiteSpace($currentConfiguration) -and ($currentConfiguration -ieq $componentProperty.Name)
              $entryClientCode = if ([string]::IsNullOrWhiteSpace($currentClientCode)) { "Base" } else { $currentClientCode }
              if ($isConfigMatch -and
                  -not [string]::IsNullOrWhiteSpace($currentPackage) -and
                  -not [string]::IsNullOrWhiteSpace($currentPath) -and
                  (
                    $entryClientCode -ieq $clientCodeSelector -or
                    ($entryClientCode -ieq "Base" -and [string]::IsNullOrWhiteSpace($packageName))
                  )) {
                $packageName = $currentPackage
                $packageSourceRoot = $currentPath
              }
            }

            if ([string]::IsNullOrWhiteSpace($packageName)) {
              Write-Error "Database package not found for component '$($componentProperty.Name)' in manifest: $manifestPath"
              exit 1
            }

            if ($envConfig.PSObject.Properties.Name -contains 'package_source_root') {
              $packageSourceRoot = $envConfig.package_source_root
            }

            if ([string]::IsNullOrWhiteSpace($packageSourceRoot)) {
              Write-Error "Database package source root not found for component '$($componentProperty.Name)'"
              exit 1
            }

            if ($null -eq $envConfig.PSObject.Properties["extracted_package_root"] -or [string]::IsNullOrWhiteSpace($envConfig.extracted_package_root)) {
              Write-Error "extracted_package_root is required for manual DB config replacement."
              exit 1
            }

            $extractedPackageRoot = $envConfig.extracted_package_root
          } else {
            $deployPath = if ($envConfig.PSObject.Properties.Name -contains 'deploy_path') {
              $envConfig.deploy_path
            } else {
              [System.IO.Path]::Combine($envConfig.deploy_root, $envConfig.application_root_name, $envConfig.component_name)
            }

            if ([string]::IsNullOrWhiteSpace($deployPath)) {
              Write-Error "Deploy path could not be resolved for component '$($componentProperty.Name)'"
              exit 1
            }
          }

          $replacementCandidates = @(
            (Join-Path (Join-Path (Join-Path (Join-Path "Client" $client) $stage) $applicationName) "config-replacements.json"),
            (Join-Path (Join-Path (Join-Path "Client" $client) $applicationName) "config-replacements.json")
          )

          $replacementPath = $replacementCandidates |
            Where-Object { Test-Path $_ } |
            Select-Object -First 1

          if ([string]::IsNullOrWhiteSpace($replacementPath) -or -not (Test-Path $replacementPath)) {
            Write-Error "Config replacement file not found. Checked: $($replacementCandidates -join ', ')"
            exit 1
          }

          $replacementConfig = Get-Content $replacementPath -Raw | ConvertFrom-Json
          $replacementApplicationProperty = $replacementConfig.PSObject.Properties |
            Where-Object { $_.Name -ieq $applicationProperty.Name } |
            Select-Object -First 1

          if ($null -eq $replacementApplicationProperty) {
            Write-Error "Application '$($applicationProperty.Name)' not found in replacement config: $replacementPath"
            exit 1
          }

          $replacementComponentProperty = $replacementApplicationProperty.Value.PSObject.Properties |
            Where-Object { $_.Name -ieq $componentProperty.Name } |
            Select-Object -First 1

          if ($null -eq $replacementComponentProperty) {
            Write-Error "Component '$($componentProperty.Name)' not found in replacement config: $replacementPath"
            exit 1
          }

          $replacementItem = $replacementComponentProperty.Value
          $isEnabled = ($replacementItem.PSObject.Properties["enabled"] -and "$($replacementItem.enabled)" -ieq "true")
          if (-not $isEnabled) {
            Write-Error "Config replacement is disabled for component '$($replacementComponentProperty.Name)' in $replacementPath"
            exit 1
          }

          # Merge shared_tokens (application-level) + component tokens (component-level overrides shared)
          $mergedTokens = [ordered]@{}
          $sharedTokensProp = $replacementApplicationProperty.Value.PSObject.Properties["shared_tokens"]
          if ($null -ne $sharedTokensProp) {
            foreach ($p in $sharedTokensProp.Value.PSObject.Properties) { $mergedTokens[$p.Name] = $p.Value }
          }
          if ($null -ne $replacementItem.PSObject.Properties["tokens"]) {
            foreach ($p in $replacementItem.tokens.PSObject.Properties) { $mergedTokens[$p.Name] = $p.Value }
          }
          if ($mergedTokens.Count -eq 0) {
            Write-Error "No replacement tokens found for component '$($replacementComponentProperty.Name)' in $replacementPath (checked shared_tokens and component tokens)"
            exit 1
          }

          $patterns = @($replacementItem.file_patterns) |
            Where-Object { -not [string]::IsNullOrWhiteSpace($_) }

          if ($patterns.Count -eq 0) {
            $patterns = if ($isDatabaseComponent) { @("*.sql") } else { @("*.json", "appsettings.json", "web.config") }
          }

          $githubRunner = @($envConfig.github_runner) | ConvertTo-Json -Compress
          $replacementTokens = [pscustomobject]$mergedTokens | ConvertTo-Json -Depth 20 -Compress
          $replacementPatterns = $patterns -join "`n"

          Add-Content $env:GITHUB_OUTPUT "application_name=$($applicationProperty.Name)"
          Add-Content $env:GITHUB_OUTPUT "component_name=$($componentProperty.Name)"
          Add-Content $env:GITHUB_OUTPUT "target_type=$targetType"
          Add-Content $env:GITHUB_OUTPUT "deploy_path=$deployPath"
          Add-Content $env:GITHUB_OUTPUT "package_name=$packageName"
          Add-Content $env:GITHUB_OUTPUT "package_source_root=$packageSourceRoot"
          Add-Content $env:GITHUB_OUTPUT "extracted_package_root=$extractedPackageRoot"
          Add-Content $env:GITHUB_OUTPUT "package_version=$version"
          Add-Content $env:GITHUB_OUTPUT "github_runner=$githubRunner"
          Add-Content $env:GITHUB_OUTPUT "config_replacement_tokens=$replacementTokens"
          Add-Content $env:GITHUB_OUTPUT "config_replacement_file_patterns<<EOF"
          Add-Content $env:GITHUB_OUTPUT $replacementPatterns
          Add-Content $env:GITHUB_OUTPUT "EOF"

          Write-Host "Application: $($applicationProperty.Name)"
          Write-Host "Component: $($componentProperty.Name)"
          Write-Host "Target Type: $targetType"
          Write-Host "Client Config: $configPath"
          Write-Host "Replacement Config: $replacementPath"
          Write-Host "Deploy Path: $deployPath"
          Write-Host "Package: $packageName"
          Write-Host "Package Source Root: $packageSourceRoot"
          Write-Host "Extracted Package Root: $extractedPackageRoot"
          Write-Host "GitHub Runner: $githubRunner"

  replace-config:
    name: Replace config for ${{ needs.read-config.outputs.application_name }} / ${{ needs.read-config.outputs.component_name }}
    needs: read-config
    runs-on: ${{ fromJSON(needs.read-config.outputs.github_runner) }}
    env:
      TARGET_TYPE: ${{ needs.read-config.outputs.target_type }}
      DEPLOY_PATH: ${{ needs.read-config.outputs.deploy_path }}
      PACKAGE_NAME: ${{ needs.read-config.outputs.package_name }}
      PACKAGE_SOURCE_ROOT: ${{ needs.read-config.outputs.package_source_root }}
      EXTRACTED_PACKAGE_ROOT: ${{ needs.read-config.outputs.extracted_package_root }}
      PACKAGE_VERSION: ${{ needs.read-config.outputs.package_version }}
      APPLICATION_NAME: ${{ needs.read-config.outputs.application_name }}
      COMPONENT_NAME: ${{ needs.read-config.outputs.component_name }}
      CONFIG_REPLACEMENT_FILE_PATTERNS: ${{ needs.read-config.outputs.config_replacement_file_patterns }}
      CONFIG_REPLACEMENT_TOKENS: ${{ needs.read-config.outputs.config_replacement_tokens }}
    steps:
      - name: Replace configuration tokens
        shell: powershell
        run: |
          if ($Env:TARGET_TYPE -eq "database") {
            if (-not (Test-Path $Env:PACKAGE_SOURCE_ROOT)) {
              Write-Error "Package source path not found: $Env:PACKAGE_SOURCE_ROOT"
              exit 1
            }

            $package = Get-ChildItem -Path $Env:PACKAGE_SOURCE_ROOT -Recurse -File |
              Where-Object { $_.Name -eq $Env:PACKAGE_NAME } |
              Select-Object -First 1

            if (-not $package) {
              Write-Error "Database scripts package not found: $Env:PACKAGE_NAME under $Env:PACKAGE_SOURCE_ROOT"
              exit 1
            }

            $extractPath = Join-Path (Join-Path (Join-Path $Env:EXTRACTED_PACKAGE_ROOT "ManualConfigReplace") $Env:APPLICATION_NAME) $Env:PACKAGE_VERSION
            Write-Host "Extracting database scripts package to: $extractPath"

            if (Test-Path $extractPath) {
              Remove-Item -Path $extractPath -Recurse -Force
            }

            New-Item -ItemType Directory -Path $extractPath -Force | Out-Null

            $tempZipPath = Join-Path $env:RUNNER_TEMP "db_scripts_config_replace.zip"
            if (Test-Path $tempZipPath) {
              Remove-Item $tempZipPath -Force
            }

            Copy-Item -Path $package.FullName -Destination $tempZipPath -Force
            Add-Type -AssemblyName System.IO.Compression.FileSystem
            [System.IO.Compression.ZipFile]::ExtractToDirectory($tempZipPath, $extractPath)
            Remove-Item $tempZipPath -Force

            $targetPath = $extractPath
          } else {
            $targetPath = $Env:DEPLOY_PATH
          }

          if ([string]::IsNullOrWhiteSpace($targetPath) -or -not (Test-Path $targetPath)) {
            Write-Error "Config replacement target path not found: $targetPath"
            exit 1
          }

          $tokens = $Env:CONFIG_REPLACEMENT_TOKENS | ConvertFrom-Json
          $tokenProperties = @($tokens.PSObject.Properties)
          if ($tokenProperties.Count -eq 0) {
            Write-Error "No token properties were provided."
            exit 1
          }

          $patterns = @($Env:CONFIG_REPLACEMENT_FILE_PATTERNS -split "`r?`n") |
            ForEach-Object { $_.Trim() } |
            Where-Object { -not [string]::IsNullOrWhiteSpace($_) } |
            Select-Object -Unique

          if ($patterns.Count -eq 0) {
            $patterns = if ($Env:TARGET_TYPE -eq "database") { @("*.sql") } else { @("*.json", "appsettings.json", "web.config") }
          }

          $filesByPath = @{}
          foreach ($pattern in $patterns) {
            $filePattern = $pattern
            if ($filePattern.StartsWith("**\")) {
              $filePattern = $filePattern.Substring(3)
            }

            if ($filePattern -like "*\*") {
              $filePattern = Split-Path -Path $filePattern -Leaf
            }

            Get-ChildItem -Path $targetPath -Recurse -File -Filter $filePattern -ErrorAction SilentlyContinue |
              ForEach-Object { $filesByPath[$_.FullName] = $_ }
          }

          if ($filesByPath.Count -eq 0) {
            Write-Error "No files matched config replacement patterns under $targetPath."
            exit 1
          }

          $updatedFileCount = 0
          $partialFileCount = 0
          foreach ($file in $filesByPath.Values) {
            $reader = [System.IO.StreamReader]::new($file.FullName, $true)
            try {
              $content = $reader.ReadToEnd()
              $encoding = $reader.CurrentEncoding
            } finally {
              $reader.Close()
            }

            $updatedContent = $content
            $replacedTokens = @()
            foreach ($token in $tokenProperties) {
              $tokenPattern = "#\{" + [regex]::Escape([string]$token.Name) + "\}"
              if ([regex]::IsMatch($updatedContent, $tokenPattern, [System.Text.RegularExpressions.RegexOptions]::IgnoreCase)) {
                $updatedContent = [regex]::Replace(
                  $updatedContent,
                  $tokenPattern,
                  [System.Text.RegularExpressions.MatchEvaluator]{ param($m) [string]$token.Value },
                  [System.Text.RegularExpressions.RegexOptions]::IgnoreCase
                )
                $replacedTokens += $token.Name
              }
            }

            if ($updatedContent -ne $content) {
              [System.IO.File]::WriteAllText($file.FullName, $updatedContent, $encoding)

              $remainingPlaceholders = @(
                [regex]::Matches($updatedContent, '#\{[^}]+\}') |
                  ForEach-Object { $_.Value } |
                  Sort-Object -Unique
              )

              if ($remainingPlaceholders.Count -gt 0) {
                $partialFileCount++
                Write-Host "Partially replaced config tokens in: $($file.FullName)"
                Write-Host "  Replaced tokens: $((@($replacedTokens) | Sort-Object -Unique) -join ', ')"
                Write-Host "  Remaining placeholders: $($remainingPlaceholders -join ', ')"
              } else {
                $updatedFileCount++
                Write-Host "Updated config tokens in: $($file.FullName)"
                Write-Host "  Replaced tokens: $((@($replacedTokens) | Sort-Object -Unique) -join ', ')"
              }
            }
          }

          Write-Host "Config replacement completed. Target path: $targetPath"
          Write-Host "Fully updated files: $updatedFileCount; partially updated files: $partialFileCount"

