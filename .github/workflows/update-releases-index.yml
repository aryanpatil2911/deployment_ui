name: Update Releases Index

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-index:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0


      - name: Generate index.json with nested paths
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "App" | Out-Null

          $index = @{}

          if (Test-Path "App/index.json") {
             $oldIndex = Get-Content "App/index.json" | ConvertFrom-Json

             foreach ($property in $oldIndex.PSObject.Properties) {
             $index[$property.Name] = @($property.Value)
            }
          }

          $files = git diff --name-only HEAD~1 HEAD |
                   Where-Object { $_ -match "^App/.+\.yml$" } |
                   Sort-Object 

          foreach ($file in $files) {

              $relativePath = $file.Replace('\','/')

              if ($relativePath -match "App/([^/]+)/(.+)$") {

                  $app = $matches[1]
                  $fileName = $matches[2]

                  if (!$index.ContainsKey($app)) {
                      $index[$app] = @()
                  }

                  $index[$app] += $fileName
              }
          }

          $index | ConvertTo-Json -Depth 10 | Set-Content "App/index.json"

          Write-Host "Generated App/index.json"
          Get-Content "App/index.json"


      
          

      - name: Commit and push changes
        shell: pwsh
        run: |

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"


          git add App/index.json 


          git diff --cached --quiet

          if ($LASTEXITCODE -eq 0) {

              Write-Host "No changes to commit"

          }
          else {

              git commit -m "chore: update index.json [skip ci]"

              git push

              Write-Host "Updated index.json"

          }
