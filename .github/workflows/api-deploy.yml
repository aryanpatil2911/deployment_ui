name: Deploy API

on:
  workflow_dispatch:
    inputs:
      client:
        description: 'Client name'
        required: true
        type: choice
        options:
          - QA
          - BAIN
          - DKCM
          - MASH
          - KLIM
          - MPCM
          - MTEU
          - QRMO
          - DEMO
      application:
        description: 'Application name (example: Recon)'
        required: true
        default: Recon
        type: string
      version:
        description: 'Application package version (example: 2.26.0428.92)'
        required: true
        default: 2.26.0428.92
        type: string
      stage:
        description: 'Target environment'
        required: true
        default: QA
        type: choice
        options:
          - QA
          - UAT
          - PROD
      component:
        description: 'API component key from config'
        required: true
        default: api
        type: string
  workflow_call:
    inputs:
      client:
        description: 'Client name'
        required: true
        type: string
      application:
        description: 'Application name (example: Recon)'
        required: true
        default: Recon
        type: string
      version:
        description: 'Application package version (example: 2.26.0428.92)'
        required: true
        default: 2.26.0428.92
        type: string
      stage:
        description: 'Target environment'
        required: true
        default: QA
        type: string
      component:
        description: 'API component key from config'
        required: true
        default: api
        type: string
permissions:
  contents: read

jobs:
  read-config:
    runs-on: windows-latest
    outputs:
      application_name: ${{ steps.cfg.outputs.application_name }}
      package_name: ${{ steps.cfg.outputs.package_name }}
      package_source_root: ${{ steps.cfg.outputs.package_source_root }}
      deploy_path: ${{ steps.cfg.outputs.deploy_path }}
      backup_path: ${{ steps.cfg.outputs.backup_path }}
      iis_site_name: ${{ steps.cfg.outputs.iis_site_name }}
      iis_parent_site: ${{ steps.cfg.outputs.iis_parent_site }}
      iis_app_pool: ${{ steps.cfg.outputs.iis_app_pool }}
      iis_app_pool_clr_version: ${{ steps.cfg.outputs.iis_app_pool_clr_version }}
      iis_service_user: ${{ steps.cfg.outputs.iis_service_user }}
      github_runner: ${{ steps.cfg.outputs.github_runner }}
      target_server: ${{ steps.cfg.outputs.target_server }}
      winrm_username: ${{ steps.cfg.outputs.winrm_username }}
      target_server_role: ${{ steps.cfg.outputs.target_server_role }}
      config_replacements_enabled: ${{ steps.cfg.outputs.config_replacements_enabled }}
      config_replacement_file_patterns: ${{ steps.cfg.outputs.config_replacement_file_patterns }}
      config_replacement_tokens: ${{ steps.cfg.outputs.config_replacement_tokens }}
    steps:
      - uses: actions/checkout@v5

      - name: Read application package and environment config
        id: cfg
        shell: powershell
        run: |
          $application = "${{ inputs.application }}".Trim()
          $version = "${{ inputs.version }}".Trim()
          $stage = "${{ inputs.stage }}".Trim().ToUpperInvariant()
          $client = "${{ inputs.client }}".Trim()
          $component = "${{ inputs.component }}".Trim()

          if ([string]::IsNullOrWhiteSpace($application)) {
            Write-Error "Application is required"
            exit 1
          }

          if ([string]::IsNullOrWhiteSpace($version)) {
            Write-Error "Version is required"
            exit 1
          }

          if ([string]::IsNullOrWhiteSpace($component)) {
            Write-Error "Component is required"
            exit 1
          }

          $applicationFolder = Get-ChildItem -Path "App" -Directory |
            Where-Object { $_.Name -ieq $application } |
            Select-Object -First 1

          if ($null -eq $applicationFolder) {
            Write-Error "Application folder not found under App: $application"
            exit 1
          }

          $applicationName = $applicationFolder.Name
          $manifestName = "{0}_{1}.yml" -f $applicationFolder.Name, $version
          $manifestPath = Join-Path $applicationFolder.FullName $manifestName

          if (-not (Test-Path $manifestPath)) {
            Write-Host "Available manifests under $($applicationFolder.FullName):"
            Get-ChildItem -Path $applicationFolder.FullName -Filter "*.yml" -File |
              ForEach-Object { Write-Host " - $($_.Name)" }

            Write-Error "Application package manifest not found: $manifestPath"
            exit 1
          }

          $manifestLines = Get-Content $manifestPath
          $packageName = $null
          $packageSourceRoot = $null
          $resolvedConfigKey = $null
          $clientCodeSelector = $client

          # New format parser: components as list with type/configuration.
          $targetType = "api"
          $currentType = $null
          $currentConfiguration = $null
          $currentClientCode = $null
          $currentPackage = $null
          $currentPath = $null
          $newFormatSeen = $false

          foreach ($line in $manifestLines) {
            if ($line -match '^\s+-\s+type:\s*(api|api_configuration|database|web|web_configuration)\s*$') {
              if ($newFormatSeen -and $currentType -ieq $targetType) {
                $isConfigMatch = -not [string]::IsNullOrWhiteSpace($currentConfiguration) -and ($currentConfiguration -ieq $component)
                $entryClientCode = if ([string]::IsNullOrWhiteSpace($currentClientCode)) { "Base" } else { $currentClientCode }
                if ($isConfigMatch -and
                    -not [string]::IsNullOrWhiteSpace($currentPackage) -and
                    -not [string]::IsNullOrWhiteSpace($currentPath) -and
                    (
                      $entryClientCode -ieq $clientCodeSelector -or
                      ($entryClientCode -ieq "Base" -and [string]::IsNullOrWhiteSpace($packageName))
                    )) {
                  $packageName = $currentPackage
                  $packageSourceRoot = $currentPath
                  $resolvedConfigKey = if ([string]::IsNullOrWhiteSpace($currentConfiguration)) { $component } else { $currentConfiguration }
                }
              }

              $newFormatSeen = $true
              $currentType = switch ($matches[1]) {
                'api_configuration' { 'api' }
                'web_configuration' { 'web' }
                default { $matches[1] }
              }
              $currentConfiguration = $null
              $currentClientCode = $null
              $currentPackage = $null
              $currentPath = $null
              continue
            }

            if ($newFormatSeen -and $line -match '^\s+component:\s*(.+?)\s*$') {
              $currentConfiguration = $matches[1].Trim().Trim("'").Trim('"')
              continue
            }

            if ($newFormatSeen -and $line -match '^\s+client_code:\s*(.+?)\s*$') {
              $currentClientCode = $matches[1].Trim().Trim("'").Trim('"')
              continue
            }

            if ($newFormatSeen -and $line -match '^\s+package:\s*(.+?)\s*$') {
              $currentPackage = $matches[1].Trim().Trim("'").Trim('"')
              continue
            }

            if ($newFormatSeen -and $line -match '^\s+path:\s*(.+?)\s*$') {
              $currentPath = $matches[1].Trim().Trim("'").Trim('"')
              continue
            }
          }

          if ($newFormatSeen -and $currentType -ieq $targetType) {
            $isConfigMatch = -not [string]::IsNullOrWhiteSpace($currentConfiguration) -and ($currentConfiguration -ieq $component)
            $entryClientCode = if ([string]::IsNullOrWhiteSpace($currentClientCode)) { "Base" } else { $currentClientCode }
            if ($isConfigMatch -and
                -not [string]::IsNullOrWhiteSpace($currentPackage) -and
                -not [string]::IsNullOrWhiteSpace($currentPath) -and
                (
                  $entryClientCode -ieq $clientCodeSelector -or
                  ($entryClientCode -ieq "Base" -and [string]::IsNullOrWhiteSpace($packageName))
                )) {
              $packageName = $currentPackage
              $packageSourceRoot = $currentPath
              $resolvedConfigKey = if ([string]::IsNullOrWhiteSpace($currentConfiguration)) { $component } else { $currentConfiguration }
            }
          }

          # Backward-compatible parser: components as keyed map.
          if ([string]::IsNullOrWhiteSpace($packageName) -or [string]::IsNullOrWhiteSpace($packageSourceRoot)) {
            $inComponent = $false
            foreach ($line in $manifestLines) {
              if ($line -match '^\s+([^:\s]+):\s*$') {
                $key = $matches[1]
                $inComponent = ($key -ieq $component) -or (($component -ieq "api") -and ($key -match '^api\d*$'))
                if ($inComponent -and [string]::IsNullOrWhiteSpace($resolvedConfigKey)) {
                  $resolvedConfigKey = $key
                }
                continue
              }

              if ($inComponent -and $line -match '^\s+package:\s*(.+?)\s*$') {
                $packageName = $matches[1].Trim().Trim("'").Trim('"')
                continue
              }

              if ($inComponent -and $line -match '^\s+path:\s*(.+?)\s*$') {
                $packageSourceRoot = $matches[1].Trim().Trim("'").Trim('"')
                continue
              }
            }
          }

          if ([string]::IsNullOrWhiteSpace($packageName)) {
            Write-Error "Package not found for component '$component' in manifest: $manifestPath"
            exit 1
          }

          if ([string]::IsNullOrWhiteSpace($packageSourceRoot)) {
            Write-Error "Package path not found for component '$component' in manifest: $manifestPath"
            exit 1
          }

          $configCandidates = @(
            (Join-Path (Join-Path (Join-Path (Join-Path "Client" $client) $stage) $applicationName) "deployment.json"),
            (Join-Path (Join-Path (Join-Path "Client" $client) $applicationName) "deployment.json"),
            (Join-Path (Join-Path (Join-Path "Client" $client) $stage) "$applicationName.json")
          )

          $configPath = $configCandidates |
            Where-Object { Test-Path $_ } |
            Select-Object -First 1

          if ([string]::IsNullOrWhiteSpace($configPath) -or -not (Test-Path $configPath)) {
            Write-Error "Client config not found. Checked: $($configCandidates -join ', ')"
            exit 1
          }

          $config = Get-Content $configPath -Raw | ConvertFrom-Json
          $applicationProperty = $config.PSObject.Properties |
            Where-Object { $_.Name -ieq $applicationName } |
            Select-Object -First 1

          if ($null -eq $applicationProperty) {
            Write-Error "Application '$applicationName' not found in config: $configPath"
            exit 1
          }

          $applicationConfig = $applicationProperty.Value
          $configKey = if ([string]::IsNullOrWhiteSpace($resolvedConfigKey)) { $component } else { $resolvedConfigKey }
          $componentProperty = $applicationConfig.PSObject.Properties |
            Where-Object { $_.Name -ieq $configKey } |
            Select-Object -First 1

          if ($null -eq $componentProperty -and $component -ieq "api") {
            $componentProperty = $applicationConfig.PSObject.Properties |
              Where-Object { $_.Name -match '^api\d*$' } |
              Select-Object -First 1
          }

          # Fall back: search all other top-level keys in deployment.json
          if ($null -eq $componentProperty) {
            foreach ($appProp in $config.PSObject.Properties) {
              if ($appProp.Name -ieq $applicationName) { continue }
              $componentProperty = $appProp.Value.PSObject.Properties |
                Where-Object { $_.Name -ieq $configKey } |
                Select-Object -First 1
              if ($null -ne $componentProperty) {
                Write-Host "Component '$configKey' found under top-level key '$($appProp.Name)'"
                break
              }
            }
          }

          if ($null -eq $componentProperty) {
            Write-Error "Component/configuration '$configKey' not found in config: $configPath"
            exit 1
          }

          $envConfig = $componentProperty.Value
          if ($null -eq $envConfig.PSObject.Properties["github_runner"]) {
            Write-Error "github_runner is required for application '$($applicationProperty.Name)' component '$($componentProperty.Name)' in config: $configPath"
            exit 1
          }

          if ($envConfig.PSObject.Properties.Name -contains 'package_source_root') {
            $packageSourceRoot = $envConfig.package_source_root
          }

          $isConfigurationOnly = -not ($envConfig.PSObject.Properties.Name -contains 'iis_site_name' -and -not [string]::IsNullOrWhiteSpace($envConfig.iis_site_name))

          $configReplacementsEnabled = "false"
          $configReplacementFilePatterns = ""
          $configReplacementTokens = "{}"
          $replacementCandidates = @(
            (Join-Path (Join-Path (Join-Path (Join-Path "Client" $client) $stage) $applicationName) "config-replacements.json"),
            (Join-Path (Join-Path (Join-Path "Client" $client) $applicationName) "config-replacements.json")
          )

          $replacementPath = $replacementCandidates |
            Where-Object { Test-Path $_ } |
            Select-Object -First 1

          if (-not [string]::IsNullOrWhiteSpace($replacementPath)) {
            $replacementConfig = Get-Content $replacementPath -Raw | ConvertFrom-Json
            $replacementApplicationProperty = $replacementConfig.PSObject.Properties |
              Where-Object { $_.Name -ieq $applicationProperty.Name } |
              Select-Object -First 1

            if ($null -ne $replacementApplicationProperty) {
              $replacementComponentProperty = $replacementApplicationProperty.Value.PSObject.Properties |
                Where-Object { $_.Name -ieq $componentProperty.Name } |
                Select-Object -First 1

              if ($null -ne $replacementComponentProperty) {
                $replacementItem = $replacementComponentProperty.Value
                $isEnabled = ($replacementItem.PSObject.Properties["enabled"] -and "$($replacementItem.enabled)" -ieq "true")

                # Merge shared_tokens (application-level) + component tokens (component-level overrides shared)
                $mergedTokens = [ordered]@{}
                $sharedTokensProp = $replacementApplicationProperty.Value.PSObject.Properties["shared_tokens"]
                if ($null -ne $sharedTokensProp) {
                  foreach ($p in $sharedTokensProp.Value.PSObject.Properties) { $mergedTokens[$p.Name] = $p.Value }
                }
                if ($null -ne $replacementItem.PSObject.Properties["tokens"]) {
                  foreach ($p in $replacementItem.tokens.PSObject.Properties) { $mergedTokens[$p.Name] = $p.Value }
                }

                if ($isEnabled -and $mergedTokens.Count -gt 0) {
                  $patterns = @($replacementItem.file_patterns) |
                    Where-Object { -not [string]::IsNullOrWhiteSpace($_) }

                  if ($patterns.Count -eq 0) {
                    $patterns = @("*.json", "appsettings.json", "web.config")
                  }

                  $configReplacementsEnabled = "true"
                  $configReplacementFilePatterns = $patterns -join "`n"
                  $configReplacementTokens = [pscustomobject]$mergedTokens | ConvertTo-Json -Depth 20 -Compress
                }
              }
            }
          }

          $githubRunner = @($envConfig.github_runner) | ConvertTo-Json -Compress

          $deployPath = if ($envConfig.PSObject.Properties.Name -contains 'deploy_path') {
            $envConfig.deploy_path
          } elseif ($envConfig.PSObject.Properties.Name -contains 'deploy_root' -and $isConfigurationOnly) {
            $envConfig.deploy_root
          } elseif ($envConfig.PSObject.Properties.Name -contains 'deploy_root' -and
            $envConfig.PSObject.Properties.Name -contains 'application_root_name' -and
            $envConfig.PSObject.Properties.Name -contains 'component_name') {
            [System.IO.Path]::Combine($envConfig.deploy_root, $envConfig.application_root_name, $envConfig.component_name)
          } else {
            $envConfig.deploy_root
          }

          $backupPath = if ($envConfig.PSObject.Properties.Name -contains 'backup_path') {
            $envConfig.backup_path
          } elseif ($envConfig.PSObject.Properties.Name -contains 'backup_root' -and $isConfigurationOnly) {
            $envConfig.backup_root
          } elseif ($envConfig.PSObject.Properties.Name -contains 'backup_root' -and
            $envConfig.PSObject.Properties.Name -contains 'application_root_name' -and
            $envConfig.PSObject.Properties.Name -contains 'component_name') {
            [System.IO.Path]::Combine($envConfig.backup_root, $envConfig.application_root_name, $envConfig.component_name)
          } else {
            $envConfig.backup_root
          }

          $iisParentSite = if ($envConfig.PSObject.Properties.Name -contains 'iis_website_name' -and -not [string]::IsNullOrWhiteSpace($envConfig.iis_website_name)) {
            $envConfig.iis_website_name
          } elseif ($envConfig.PSObject.Properties.Name -contains 'iis_parent_site' -and -not [string]::IsNullOrWhiteSpace($envConfig.iis_parent_site)) {
            $envConfig.iis_parent_site
          } else {
            "Default Web Site"
          }

          Add-Content $env:GITHUB_OUTPUT "application_name=$($applicationProperty.Name)"
          Add-Content $env:GITHUB_OUTPUT "package_name=$packageName"
          Add-Content $env:GITHUB_OUTPUT "package_source_root=$packageSourceRoot"
          Add-Content $env:GITHUB_OUTPUT "deploy_path=$deployPath"
          Add-Content $env:GITHUB_OUTPUT "backup_path=$backupPath"
          Add-Content $env:GITHUB_OUTPUT "iis_site_name=$($envConfig.iis_site_name)"
          Add-Content $env:GITHUB_OUTPUT "iis_parent_site=$iisParentSite"
          Add-Content $env:GITHUB_OUTPUT "iis_app_pool=$($envConfig.iis_app_pool)"
          Add-Content $env:GITHUB_OUTPUT "iis_app_pool_clr_version=$($envConfig.iis_app_pool_clr_version)"
          Add-Content $env:GITHUB_OUTPUT "iis_service_user=$($envConfig.iis_service_user)"
          Add-Content $env:GITHUB_OUTPUT "github_runner=$githubRunner"
          Add-Content $env:GITHUB_OUTPUT "target_server=$($envConfig.target_server)"
          Add-Content $env:GITHUB_OUTPUT "winrm_username=$($envConfig.winrm_username)"
          Add-Content $env:GITHUB_OUTPUT "target_server_role=$($envConfig.target_server_role)"
          Add-Content $env:GITHUB_OUTPUT "config_replacements_enabled=$configReplacementsEnabled"
          Add-Content $env:GITHUB_OUTPUT "config_replacement_tokens=$configReplacementTokens"
          Add-Content $env:GITHUB_OUTPUT "config_replacement_file_patterns<<EOF"
          Add-Content $env:GITHUB_OUTPUT $configReplacementFilePatterns
          Add-Content $env:GITHUB_OUTPUT "EOF"

          Write-Host "Application: $($applicationProperty.Name)"
          Write-Host "Component: $($componentProperty.Name)"
          Write-Host "Package: $packageName"
          Write-Host "Package Source Root: $packageSourceRoot"
          Write-Host "Client Config: $configPath"
          Write-Host "GitHub Runner: $githubRunner"
          Write-Host "Deploy Path: $deployPath"
          Write-Host "IIS Site: $($envConfig.iis_site_name)"
          Write-Host "IIS Parent Site: $iisParentSite"
          Write-Host "Config Replacements Enabled: $configReplacementsEnabled"

  deploy-qa:
    needs: read-config
    if: ${{ inputs.stage == 'QA' && needs.read-config.outputs.iis_site_name != '' }}
    uses: ./.github/workflows/reusable-iis-deploy.yml
    with:
      application_name: ${{ needs.read-config.outputs.application_name }}
      stage: ${{ inputs.stage }}
      client: ${{ inputs.client }}
      package_name: ${{ needs.read-config.outputs.package_name }}
      package_source_root: ${{ needs.read-config.outputs.package_source_root }}
      deploy_path: ${{ needs.read-config.outputs.deploy_path }}
      backup_path: ${{ needs.read-config.outputs.backup_path }}
      iis_site_name: ${{ needs.read-config.outputs.iis_site_name }}
      iis_parent_site: ${{ needs.read-config.outputs.iis_parent_site }}
      iis_app_pool: ${{ needs.read-config.outputs.iis_app_pool }}
      iis_app_pool_clr_version: ${{ needs.read-config.outputs.iis_app_pool_clr_version }}
      iis_service_user: ${{ needs.read-config.outputs.iis_service_user }}
      github_runner: ${{ needs.read-config.outputs.github_runner }}
      config_replacements_enabled: ${{ needs.read-config.outputs.config_replacements_enabled }}
      config_replacement_file_patterns: ${{ needs.read-config.outputs.config_replacement_file_patterns }}
      config_replacement_tokens: ${{ needs.read-config.outputs.config_replacement_tokens }}
      target_server: ${{ needs.read-config.outputs.target_server }}
      winrm_username: ${{ needs.read-config.outputs.winrm_username }}
      target_server_role: ${{ needs.read-config.outputs.target_server_role }}
    secrets:
      iis_service_password: ${{ secrets.QA_IIS_SERVICE_PASSWORDS }}
      winrm_password: ${{ secrets.QA_WINRM_PASSWORDS }}
      sftp_host: ${{ secrets.Release_SFTP_HOST }}
      sftp_username: ${{ secrets.Release_SFTP_USERNAME }}
      sftp_password: ${{ secrets.Release_SFTP_PASSWORD }}

  deploy-qa-config:
    needs: read-config
    if: ${{ inputs.stage == 'QA' && needs.read-config.outputs.iis_site_name == '' }}
    uses: ./.github/workflows/reusable-copy-Deploy.yaml
    with:
      application_name: ${{ needs.read-config.outputs.application_name }}
      stage: ${{ inputs.stage }}
      client: ${{ inputs.client }}
      package_name: ${{ needs.read-config.outputs.package_name }}
      package_source_root: ${{ needs.read-config.outputs.package_source_root }}
      deploy_path: ${{ needs.read-config.outputs.deploy_path }}
      backup_path: ${{ needs.read-config.outputs.backup_path }}
      github_runner: ${{ needs.read-config.outputs.github_runner }}
      config_replacements_enabled: ${{ needs.read-config.outputs.config_replacements_enabled }}
      config_replacement_file_patterns: ${{ needs.read-config.outputs.config_replacement_file_patterns }}
      config_replacement_tokens: ${{ needs.read-config.outputs.config_replacement_tokens }}
      target_server: ${{ needs.read-config.outputs.target_server }}
      winrm_username: ${{ needs.read-config.outputs.winrm_username }}
      target_server_role: ${{ needs.read-config.outputs.target_server_role }}
    secrets:
      winrm_password: ${{ secrets.QA_WINRM_PASSWORDS }}
      sftp_host: ${{ secrets.Release_SFTP_HOST }}
      sftp_username: ${{ secrets.Release_SFTP_USERNAME }}
      sftp_password: ${{ secrets.Release_SFTP_PASSWORD }}

  deploy-uat:
    needs: read-config
    if: ${{ inputs.stage == 'UAT' && needs.read-config.outputs.iis_site_name != '' }}
    uses: ./.github/workflows/reusable-iis-deploy.yml
    with:
      application_name: ${{ needs.read-config.outputs.application_name }}
      stage: ${{ inputs.stage }}
      client: ${{ inputs.client }}
      package_name: ${{ needs.read-config.outputs.package_name }}
      package_source_root: ${{ needs.read-config.outputs.package_source_root }}
      deploy_path: ${{ needs.read-config.outputs.deploy_path }}
      backup_path: ${{ needs.read-config.outputs.backup_path }}
      iis_site_name: ${{ needs.read-config.outputs.iis_site_name }}
      iis_parent_site: ${{ needs.read-config.outputs.iis_parent_site }}
      iis_app_pool: ${{ needs.read-config.outputs.iis_app_pool }}
      iis_app_pool_clr_version: ${{ needs.read-config.outputs.iis_app_pool_clr_version }}
      iis_service_user: ${{ needs.read-config.outputs.iis_service_user }}
      github_runner: ${{ needs.read-config.outputs.github_runner }}
      config_replacements_enabled: ${{ needs.read-config.outputs.config_replacements_enabled }}
      config_replacement_file_patterns: ${{ needs.read-config.outputs.config_replacement_file_patterns }}
      config_replacement_tokens: ${{ needs.read-config.outputs.config_replacement_tokens }}
      target_server: ${{ needs.read-config.outputs.target_server }}
      winrm_username: ${{ needs.read-config.outputs.winrm_username }}
      target_server_role: ${{ needs.read-config.outputs.target_server_role }}
    secrets:
      iis_service_password: ${{ secrets.UAT_IIS_SERVICE_PASSWORDS }}
      winrm_password: ${{ secrets.UAT_WINRM_PASSWORDS }}
      sftp_host: ${{ secrets.Release_SFTP_HOST }}
      sftp_username: ${{ secrets.Release_SFTP_USERNAME }}
      sftp_password: ${{ secrets.Release_SFTP_PASSWORD }}

  deploy-uat-config:
    needs: read-config
    if: ${{ inputs.stage == 'UAT' && needs.read-config.outputs.iis_site_name == '' }}
    uses: ./.github/workflows/reusable-copy-Deploy.yaml
    with:
      application_name: ${{ needs.read-config.outputs.application_name }}
      stage: ${{ inputs.stage }}
      client: ${{ inputs.client }}
      package_name: ${{ needs.read-config.outputs.package_name }}
      package_source_root: ${{ needs.read-config.outputs.package_source_root }}
      deploy_path: ${{ needs.read-config.outputs.deploy_path }}
      backup_path: ${{ needs.read-config.outputs.backup_path }}
      github_runner: ${{ needs.read-config.outputs.github_runner }}
      config_replacements_enabled: ${{ needs.read-config.outputs.config_replacements_enabled }}
      config_replacement_file_patterns: ${{ needs.read-config.outputs.config_replacement_file_patterns }}
      config_replacement_tokens: ${{ needs.read-config.outputs.config_replacement_tokens }}
      target_server: ${{ needs.read-config.outputs.target_server }}
      winrm_username: ${{ needs.read-config.outputs.winrm_username }}
      target_server_role: ${{ needs.read-config.outputs.target_server_role }}
    secrets:
      winrm_password: ${{ secrets.UAT_WINRM_PASSWORDS }}
      sftp_host: ${{ secrets.Release_SFTP_HOST }}
      sftp_username: ${{ secrets.Release_SFTP_USERNAME }}
      sftp_password: ${{ secrets.Release_SFTP_PASSWORD }}

  deploy-prod:
    needs: read-config
    if: ${{ inputs.stage == 'PROD' && needs.read-config.outputs.iis_site_name != '' }}
    uses: ./.github/workflows/reusable-iis-deploy.yml
    with:
      application_name: ${{ needs.read-config.outputs.application_name }}
      stage: ${{ inputs.stage }}
      client: ${{ inputs.client }}
      package_name: ${{ needs.read-config.outputs.package_name }}
      package_source_root: ${{ needs.read-config.outputs.package_source_root }}
      deploy_path: ${{ needs.read-config.outputs.deploy_path }}
      backup_path: ${{ needs.read-config.outputs.backup_path }}
      iis_site_name: ${{ needs.read-config.outputs.iis_site_name }}
      iis_parent_site: ${{ needs.read-config.outputs.iis_parent_site }}
      iis_app_pool: ${{ needs.read-config.outputs.iis_app_pool }}
