name: Reusable DB Deploy

on:
  workflow_call:
    inputs:
      application_name:
        required: true
        type: string
      client:
        required: false
        type: string
        default: ""
      stage:
        required: true
        type: string
      package_name:
        required: true
        type: string
      package_source_root:
        required: true
        type: string
      extracted_package_root:
        required: true
        type: string
      deployment_script_path:
        required: true
        type: string
      db_server:
        required: true
        type: string
      db_name:
        required: true
        type: string
      db_authentication:
        required: true
        type: string
      sql_scripts_pattern:
        required: true
        type: string
      display_sql_output:
        required: true
        type: string
      trust_server_certificate:
        required: true
        type: string
      github_runner:
        required: true
        type: string
      config_replacements_enabled:
        required: false
        type: string
        default: "false"
      config_replacement_file_patterns:
        required: false
        type: string
        default: ""
      config_replacement_tokens:
        required: false
        type: string
        default: "{}"
      failed_scripts_root:
        required: false
        type: string
        default: ""
      ssrs_enabled:
        required: false
        type: string
        default: "false"
      ssrs_report_package:
        required: false
        type: string
        default: ""
      ssrs_report_package_source_root:
        required: false
        type: string
        default: ""
      ssrs_extract_root:
        required: false
        type: string
        default: ""
      ssrs_report_service_url:
        required: false
        type: string
        default: ""
      ssrs_report_execution_url:
        required: false
        type: string
        default: ""
      ssrs_report_folder:
        required: false
        type: string
        default: ""
      ssrs_datasource_folder:
        required: false
        type: string
        default: ""
      ssrs_dataset_folder:
        required: false
        type: string
        default: ""
      ssrs_parts_folder:
        required: false
        type: string
        default: ""
      ssrs_root_folder:
        required: false
        type: string
        default: ""
      ssrs_backup_location:
        required: false
        type: string
        default: ""
      ssrs_overwrite_data_sources:
        required: false
        type: string
        default: "false"
      ssrs_clear_report_folder:
        required: false
        type: string
        default: "false"
      ssrs_use_archive_structure:
        required: false
        type: string
        default: "false"
      ssrs_fail_on_unresolved_references:
        required: false
        type: string
        default: "true"
      ssrs_service_user_name:
        required: false
        type: string
        default: ""
      target_server:
        required: true
        type: string
      winrm_username:
        required: true
        type: string
      target_server_role:
        required: true
        type: string
    secrets:
      db_username:
        required: false
      db_password:
        required: false
      ssrs_service_password:
        required: false
      winrm_password:
        required: true
      sftp_host:
        required: true
      sftp_username:
        required: true
      sftp_password:
        required: true

permissions:
  contents: read

jobs:
  deploy-db-scripts:
    name: Deploy ${{ inputs.db_name }} database scripts to ${{ inputs.stage }}
    runs-on: ${{ fromJSON(inputs.github_runner) }}
    env:
      APPLICATION: ${{ inputs.application_name }}
      PACKAGE_SOURCE_ROOT: ${{ inputs.package_source_root }}
      EXTRACTED_PACKAGE_ROOT: ${{ inputs.extracted_package_root }}
      DEPLOYMENT_SCRIPT_PATH: ${{ inputs.deployment_script_path }}
      DB_SERVER: ${{ inputs.db_server }}
      DB_NAME: ${{ inputs.db_name }}
      DB_AUTHENTICATION: ${{ inputs.db_authentication }}
      SQL_SCRIPTS_PATTERN: ${{ inputs.sql_scripts_pattern }}
      DISPLAY_SQL_OUTPUT: ${{ inputs.display_sql_output }}
      TRUST_SERVER_CERTIFICATE: ${{ inputs.trust_server_certificate }}
      CONFIG_REPLACEMENTS_ENABLED: ${{ inputs.config_replacements_enabled }}
      CONFIG_REPLACEMENT_FILE_PATTERNS: ${{ inputs.config_replacement_file_patterns }}
      CONFIG_REPLACEMENT_TOKENS: ${{ inputs.config_replacement_tokens }}
      SSRS_ENABLED: ${{ inputs.ssrs_enabled }}
      SSRS_REPORT_PACKAGE: ${{ inputs.ssrs_report_package }}
      SSRS_REPORT_PACKAGE_SOURCE_ROOT: ${{ inputs.ssrs_report_package_source_root }}
      SSRS_EXTRACT_ROOT: ${{ inputs.ssrs_extract_root }}
      SSRS_REPORT_SERVICE_URL: ${{ inputs.ssrs_report_service_url }}
      SSRS_REPORT_EXECUTION_URL: ${{ inputs.ssrs_report_execution_url }}
      SSRS_REPORT_FOLDER: ${{ inputs.ssrs_report_folder }}
      SSRS_DATASOURCE_FOLDER: ${{ inputs.ssrs_datasource_folder }}
      SSRS_DATASET_FOLDER: ${{ inputs.ssrs_dataset_folder }}
      SSRS_PARTS_FOLDER: ${{ inputs.ssrs_parts_folder }}
      SSRS_ROOT_FOLDER: ${{ inputs.ssrs_root_folder }}
      SSRS_BACKUP_LOCATION: ${{ inputs.ssrs_backup_location }}
      SSRS_OVERWRITE_DATA_SOURCES: ${{ inputs.ssrs_overwrite_data_sources }}
      SSRS_CLEAR_REPORT_FOLDER: ${{ inputs.ssrs_clear_report_folder }}
      SSRS_USE_ARCHIVE_STRUCTURE: ${{ inputs.ssrs_use_archive_structure }}
      SSRS_FAIL_ON_UNRESOLVED_REFERENCES: ${{ inputs.ssrs_fail_on_unresolved_references }}
      SSRS_SERVICE_USER_NAME: ${{ inputs.ssrs_service_user_name }}
      TARGET_SERVER: ${{ inputs.target_server }}
      WINRM_USERNAME: ${{ inputs.winrm_username }}
      WINRM_PASSWORD: ${{ secrets.winrm_password }}
      SFTP_HOST: ${{ secrets.sftp_host }}
      SFTP_USERNAME: ${{ secrets.sftp_username }}
      SFTP_PASSWORD: ${{ secrets.sftp_password }}

    steps:
      - uses: actions/checkout@v5

      - name: Set PowerShell execution policy
        shell: powershell
        run: |
          Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Scope Process -Force

      - name: Resolve WinRM password for client
        shell: powershell
        env:
          WINRM_PASSWORDS_JSON: ${{ secrets.winrm_password }}
        run: |
          $client = '${{ inputs.client }}'
          $serverType = '${{ inputs.target_server_role }}'
          $allPwds = $env:WINRM_PASSWORDS_JSON | ConvertFrom-Json
          $pwd = $allPwds.$client.$serverType
          if ([string]::IsNullOrWhiteSpace($pwd)) {
            Write-Error "No winrm_password entry found for client '$client' / target_server_role '$serverType' in the WinRM passwords secret"
            exit 1
          }
          Write-Output "::add-mask::$pwd"
          Add-Content $env:GITHUB_ENV "WINRM_PASSWORD=$pwd"

      - name: Resolve SSRS service password for client
        shell: powershell
        env:
          SSRS_SERVICE_PASSWORDS_JSON: ${{ secrets.ssrs_service_password }}
        run: |
          $client = '${{ inputs.client }}'
          $serverType = '${{ inputs.target_server_role }}'
          $allPwds = $env:SSRS_SERVICE_PASSWORDS_JSON | ConvertFrom-Json
          $pwd = $allPwds.$client.$serverType
          if ([string]::IsNullOrWhiteSpace($pwd)) {
            Write-Error "No ssrs_service_password entry found for client '$client' / target_server_role '$serverType' in the SSRS service passwords secret"
            exit 1
          }
          Write-Output "::add-mask::$pwd"
          Add-Content $env:GITHUB_ENV "SSRS_SERVICE_PASSWORD=$pwd"

      - name: Resolve DB credentials for client
        shell: powershell
        env:
          DB_USERNAMES_JSON: ${{ secrets.db_username }}
          DB_PASSWORDS_JSON: ${{ secrets.db_password }}
        run: |
          $client = '${{ inputs.client }}'
          $serverType = '${{ inputs.target_server_role }}'
          $allUsers = $env:DB_USERNAMES_JSON | ConvertFrom-Json
          $dbUser = $allUsers.$client.$serverType
          if ([string]::IsNullOrWhiteSpace($dbUser)) {
            Write-Error "No db_username entry found for client '$client' / target_server_role '$serverType' in the DB usernames secret"
            exit 1
          }
          Write-Output "::add-mask::$dbUser"
          Add-Content $env:GITHUB_ENV "DB_USERNAME=$dbUser"
          $allPwds = $env:DB_PASSWORDS_JSON | ConvertFrom-Json
          $dbPwd = $allPwds.$client.$serverType
          if ([string]::IsNullOrWhiteSpace($dbPwd)) {
            Write-Error "No db_password entry found for client '$client' / target_server_role '$serverType' in the DB passwords secret"
            exit 1
          }
          Write-Output "::add-mask::$dbPwd"
          Add-Content $env:GITHUB_ENV "DB_PASSWORD=$dbPwd"

      - name: Validate inputs
        shell: powershell
        run: |
          @(
            "PACKAGE_SOURCE_ROOT",
            "EXTRACTED_PACKAGE_ROOT",
            "DEPLOYMENT_SCRIPT_PATH",
            "DB_SERVER",
            "DB_NAME",
            "DB_AUTHENTICATION",
            "SQL_SCRIPTS_PATTERN",
            "DISPLAY_SQL_OUTPUT",
            "TRUST_SERVER_CERTIFICATE",
            "TARGET_SERVER",
            "WINRM_USERNAME",
            "WINRM_PASSWORD"
          ) | ForEach-Object {
            if (-not (Test-Path "env:$_")) {
              Write-Error "$_ is not set"
              exit 1
            }

            if ([string]::IsNullOrWhiteSpace((Get-Item "env:$_").Value)) {
              Write-Error "$_ is empty"
              exit 1
            }
          }

          if ($Env:DB_AUTHENTICATION -eq "SqlAuthentication") {
            if ([string]::IsNullOrWhiteSpace($Env:DB_USERNAME)) {
              Write-Error "DB_USERNAME is required for SqlAuthentication"
              exit 1
            }

            if ([string]::IsNullOrWhiteSpace($Env:DB_PASSWORD)) {
              Write-Error "DB_PASSWORD is required for SqlAuthentication"
              exit 1
            }
          }

          $cred = New-Object PSCredential($Env:WINRM_USERNAME, (ConvertTo-SecureString $Env:WINRM_PASSWORD -AsPlainText -Force))
          if (-not (Test-WSMan -ComputerName $Env:TARGET_SERVER -Credential $cred -Authentication Default -ErrorAction SilentlyContinue)) {
            Write-Error "Cannot connect to target server via WinRM: $Env:TARGET_SERVER"
            exit 1
          }
          Write-Host "WinRM connectivity verified for: $Env:TARGET_SERVER"

      - name: Download package from SFTP
        shell: powershell
        run: |
          $packageName = "${{ inputs.package_name }}".Trim()
          $packageSourceRoot = $Env:PACKAGE_SOURCE_ROOT
          $sftpHost = $Env:SFTP_HOST
          $sftpUsername = $Env:SFTP_USERNAME
          $sftpPassword = $Env:SFTP_PASSWORD
          $stagingFolder = $packageSourceRoot
          $packagesToDownload = @($packageName)
          if ($Env:SSRS_ENABLED -ieq "true" -and -not [string]::IsNullOrWhiteSpace($Env:SSRS_REPORT_PACKAGE)) {
            $reportPackageName = $Env:SSRS_REPORT_PACKAGE.Trim()
            if ($packagesToDownload -notcontains $reportPackageName) {
              $packagesToDownload += $reportPackageName
            }
          }
          $cred = New-Object PSCredential($Env:WINRM_USERNAME, (ConvertTo-SecureString $Env:WINRM_PASSWORD -AsPlainText -Force))

          # Step 1: Download file to runner's local temp using Posh-SSH (avoids running SSH inside WinRM)
          if (-not (Get-Module -ListAvailable -Name Posh-SSH)) {
            Write-Host "Installing Posh-SSH on runner..."
            [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
            Install-PackageProvider -Name NuGet -MinimumVersion 2.8.5.201 -Force -Scope CurrentUser | Out-Null
            Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
            Install-Module Posh-SSH -Force -Scope CurrentUser -AllowClobber
          }
          Import-Module Posh-SSH

          $localTempFolder = Join-Path $env:TEMP "sftp_download"
          if (-not (Test-Path $localTempFolder)) {
            New-Item -ItemType Directory -Path $localTempFolder -Force | Out-Null
          }

          Write-Host "Downloading package(s) from SFTP $sftpHost"
          Write-Host "Posh-SSH version: $(Get-Module -Name Posh-SSH | Select-Object -ExpandProperty Version)"
          $sftpCred = New-Object PSCredential($sftpUsername, (ConvertTo-SecureString $sftpPassword -AsPlainText -Force))
          $sftpSession = New-SFTPSession -ComputerName $sftpHost -Credential $sftpCred -AcceptKey
          try {
            $poshVersion = (Get-Module -Name Posh-SSH).Version.Major
            foreach ($downloadPackage in $packagesToDownload) {
              $remotePath = "/Dev_files/Release/$downloadPackage"
              if ($poshVersion -ge 3) {
                Get-SFTPItem -SessionId $sftpSession.SessionId -Path $remotePath -Destination $localTempFolder -Force
              } else {
                Get-SFTPFile -SessionId $sftpSession.SessionId -RemoteFile $remotePath -LocalPath $localTempFolder -Overwrite
              }
              Write-Host "Downloaded to runner temp: $localTempFolder\$downloadPackage"
            }
          } finally {
            Remove-SFTPSession -SessionId $sftpSession.SessionId | Out-Null
          }

          # Step 2: Copy from runner to target server via PSSession (chunked, reliable for large files)
          Write-Host "Copying package(s) to $Env:TARGET_SERVER via PSSession"
          $sessionOptions = New-PSSessionOption -OperationTimeout 0 -IdleTimeout 3600000
          $remoteSession = New-PSSession -ComputerName $Env:TARGET_SERVER -Credential $cred -SessionOption $sessionOptions
          try {
            Invoke-Command -Session $remoteSession -ScriptBlock {
              if (-not (Test-Path $using:stagingFolder)) {
                New-Item -ItemType Directory -Path $using:stagingFolder -Force | Out-Null
                Write-Host "Created staging folder: $using:stagingFolder"
              }
            }

            foreach ($downloadPackage in $packagesToDownload) {
              $localPackagePath = Join-Path $localTempFolder $downloadPackage
              $destStagingPath = $stagingFolder.TrimEnd('\') + '\' + $downloadPackage
              Copy-Item -Path $localPackagePath -Destination $destStagingPath -ToSession $remoteSession -Force
              Write-Host "Copied to package cache: $destStagingPath on $Env:TARGET_SERVER"
            }
          } finally {
            Remove-PSSession $remoteSession
          }

          foreach ($downloadPackage in $packagesToDownload) {
            Remove-Item (Join-Path $localTempFolder $downloadPackage) -Force -ErrorAction SilentlyContinue
          }
          Add-Content $env:GITHUB_ENV "PACKAGE_SOURCE_ROOT=$stagingFolder"
          Add-Content $env:GITHUB_ENV "SSRS_REPORT_PACKAGE_SOURCE_ROOT=$stagingFolder"

      - name: Find and extract database scripts package
        shell: powershell
        run: |
          $packageName = "${{ inputs.package_name }}"
          $packageRoot = $Env:PACKAGE_SOURCE_ROOT
          $extractedRoot = $Env:EXTRACTED_PACKAGE_ROOT
          $cred = New-Object PSCredential($Env:WINRM_USERNAME, (ConvertTo-SecureString $Env:WINRM_PASSWORD -AsPlainText -Force))

          Write-Host "Searching for database scripts package: $packageName"
          Write-Host "Target server: $Env:TARGET_SERVER"

          $extractedPath = Invoke-Command -ComputerName $Env:TARGET_SERVER -Credential $cred -ScriptBlock {
            if (-not (Test-Path $using:packageRoot)) {
              throw "Package source path not found: $using:packageRoot"
            }

            $package = Get-ChildItem -Path $using:packageRoot -Recurse -File |
              Where-Object { $_.Name -eq $using:packageName } |
              Select-Object -First 1

            if (-not $package) {
              throw "Database scripts package not found: $using:packageName under $using:packageRoot"
            }

            Write-Host "Found package at: $($package.FullName)"

            if ($using:packageName -match '(\d+\.\d+\.\d+\.\d+)\.nupkg$') {
              $version = $matches[1]
              Write-Host "Package version: $version"
            } else {
              throw "Could not extract version from package name: $using:packageName"
            }

            $extractPath = Join-Path $using:extractedRoot $version
            Write-Host "Extracting to: $extractPath"

            if (Test-Path $extractPath) {
              Write-Host "Cleaning up existing extracted package path"
              Remove-Item -Path $extractPath -Recurse -Force
            }

            New-Item -ItemType Directory -Path $extractPath -Force | Out-Null

            $tempZipPath = Join-Path $env:TEMP "db_scripts_package.zip"
            if (Test-Path $tempZipPath) { Remove-Item $tempZipPath -Force }

            Copy-Item -Path $package.FullName -Destination $tempZipPath -Force

            Write-Host "Extracting archive..."
            Add-Type -AssemblyName System.IO.Compression.FileSystem
            [System.IO.Compression.ZipFile]::ExtractToDirectory($tempZipPath, $extractPath)

            Remove-Item $tempZipPath -Force

            $extractedFiles = Get-ChildItem -Path $extractPath -Recurse
            Write-Host "Extracted $($extractedFiles.Count) items"

            if ($extractedFiles.Count -eq 0) {
              throw "No files were extracted from the package"
            }

            $extractPath
          }

          Add-Content $env:GITHUB_ENV "EXTRACTED_PACKAGE_PATH=$extractedPath"

      - name: Replace database script tokens
        shell: powershell
        run: |
          $configEnabled = $Env:CONFIG_REPLACEMENTS_ENABLED
          $configTokens = $Env:CONFIG_REPLACEMENT_TOKENS
          $configPatterns = $Env:CONFIG_REPLACEMENT_FILE_PATTERNS
          $extractedPath = $Env:EXTRACTED_PACKAGE_PATH
          $workspaceRoot = $Env:GITHUB_WORKSPACE
          if ([string]::IsNullOrWhiteSpace($workspaceRoot)) {
            $workspaceRoot = (Get-Location).Path
          }

          $client = '${{ inputs.client }}'.Trim()
          $applicationName = '${{ inputs.application_name }}'.Trim()
          $stage = '${{ inputs.stage }}'.Trim()
          $sharedTokenPathCandidates = @(
            (Join-Path (Join-Path (Join-Path $workspaceRoot 'Client') $client) (Join-Path $stage $applicationName)),
            (Join-Path (Join-Path (Join-Path $workspaceRoot 'Client') $client) $applicationName)
          )

          $sharedTokenPath = $sharedTokenPathCandidates |
            Where-Object { Test-Path (Join-Path $_ 'config-replacements.json') } |
            Select-Object -First 1

          $mergedTokens = @{}
          if (-not [string]::IsNullOrWhiteSpace($configTokens) -and $configTokens -ne '{}') {
            $existingTokens = $configTokens | ConvertFrom-Json
            foreach ($tokenProperty in $existingTokens.PSObject.Properties) {
              $mergedTokens[$tokenProperty.Name] = $tokenProperty.Value
            }
          }

          if (-not [string]::IsNullOrWhiteSpace($sharedTokenPath)) {
            $replacementPath = Join-Path $sharedTokenPath 'config-replacements.json'
            $replacementConfig = Get-Content $replacementPath -Raw | ConvertFrom-Json
            $replacementApplicationProperty = $replacementConfig.PSObject.Properties |
              Where-Object { $_.Name -ieq $applicationName } |
              Select-Object -First 1

            if ($null -ne $replacementApplicationProperty) {
              $sharedTokensProp = $replacementApplicationProperty.Value.PSObject.Properties['shared_tokens']
              if ($null -ne $sharedTokensProp) {
                foreach ($sharedToken in $sharedTokensProp.Value.PSObject.Properties) {
                  $mergedTokens[$sharedToken.Name] = $sharedToken.Value
                }
              }
            }
          }

          if (-not [string]::IsNullOrWhiteSpace($extractedPath)) {
            $mergedTokens['ReconScriptFolder'] = $extractedPath
          }

          if ($mergedTokens.Count -gt 0) {
            $configTokens = [pscustomobject]$mergedTokens | ConvertTo-Json -Depth 20 -Compress
            Write-Host "Merged config replacement token keys: $((@($mergedTokens.Keys) | Sort-Object) -join ', ')"
          } else {
            Write-Host "No merged config replacement tokens were found after loading repo config."
          }

          $cred = New-Object PSCredential($Env:WINRM_USERNAME, (ConvertTo-SecureString $Env:WINRM_PASSWORD -AsPlainText -Force))

          $configTokensJson = $configTokens

          Invoke-Command -ComputerName $Env:TARGET_SERVER -Credential $cred -ArgumentList $configEnabled, $configTokensJson, $configPatterns, $extractedPath -ScriptBlock {
            param(
              [string]$configEnabled,
              [string]$configTokensJson,
              [string]$configPatterns,
              [string]$extractedPath
            )

            if ($configEnabled -ne "true") {
              Write-Host "Database script config replacements are disabled for this component."
              return
            }

            if ([string]::IsNullOrWhiteSpace($configTokensJson) -or $configTokensJson -eq "{}") {
              Write-Host "Database script config replacements enabled, but no tokens were provided."
              return
            }

            if ([string]::IsNullOrWhiteSpace($extractedPath) -or -not (Test-Path $extractedPath)) {
              throw "Extracted package path not found for config replacement: $extractedPath"
            }

            $tokens = $configTokensJson | ConvertFrom-Json
            $tokenProperties = @($tokens.PSObject.Properties)
            if ($tokenProperties.Count -eq 0) {
              Write-Host "Database script config replacements enabled, but no token properties were found."
              return
            }

            $patterns = @($configPatterns -split "`r?`n") |
              ForEach-Object { $_.Trim() } |
              Where-Object { -not [string]::IsNullOrWhiteSpace($_) } |
              Select-Object -Unique

            if ($patterns.Count -eq 0) { $patterns = @("*.sql") }

            $filesByPath = @{}
            foreach ($pattern in $patterns) {
              $filePattern = $pattern
              if ($filePattern.StartsWith("**\")) { $filePattern = $filePattern.Substring(3) }
              if ($filePattern -like "*\*") { $filePattern = Split-Path -Path $filePattern -Leaf }
              Get-ChildItem -Path $extractedPath -Recurse -File -Filter $filePattern -ErrorAction SilentlyContinue |
                ForEach-Object { $filesByPath[$_.FullName] = $_ }
            }

            if ($filesByPath.Count -eq 0) {
              Write-Host "No files matched database script config replacement patterns under $extractedPath."
              return
            }

            $updatedFileCount = 0
            $partialFileCount = 0
            foreach ($file in $filesByPath.Values) {
              $reader = [System.IO.StreamReader]::new($file.FullName, $true)
              try { $content = $reader.ReadToEnd(); $encoding = $reader.CurrentEncoding } finally { $reader.Close() }
              $updatedContent = $content
              $replacedTokens = @()
              foreach ($token in $tokenProperties) {
                $tokenPattern = "#\{" + [regex]::Escape([string]$token.Name) + "\}"
                if ([regex]::IsMatch($updatedContent, $tokenPattern, [System.Text.RegularExpressions.RegexOptions]::IgnoreCase)) {
                  $updatedContent = [regex]::Replace(
                    $updatedContent,
                    $tokenPattern,
                    [System.Text.RegularExpressions.MatchEvaluator]{ param($m) [string]$token.Value },
                    [System.Text.RegularExpressions.RegexOptions]::IgnoreCase
                  )
                  $replacedTokens += $token.Name
                }
              }
              if ($updatedContent -ne $content) {
                [System.IO.File]::WriteAllText($file.FullName, $updatedContent, $encoding)
                $remaining = @([regex]::Matches($updatedContent, '#\{[^}]+\}') | ForEach-Object { $_.Value } | Sort-Object -Unique)
                if ($remaining.Count -gt 0) {
                  $partialFileCount++
                  Write-Host "Partially replaced tokens in: $($file.FullName)"
                  Write-Host "  Replaced: $((@($replacedTokens) | Sort-Object -Unique) -join ', ')"
                  Write-Host "  Remaining: $($remaining -join ', ')"
                } else {
                  $updatedFileCount++
                  Write-Host "Updated tokens in: $($file.FullName)"
                }
              }
            }
            Write-Host "Database script config replacement completed. Fully updated: $updatedFileCount; partially updated: $partialFileCount"
          }

      - name: Resolve deployment script path tokens
        shell: powershell
        run: |
          $deploymentScriptPath = $Env:DEPLOYMENT_SCRIPT_PATH
          $configTokens = $Env:CONFIG_REPLACEMENT_TOKENS
          $workspaceRoot = $Env:GITHUB_WORKSPACE
          if ([string]::IsNullOrWhiteSpace($workspaceRoot)) {
            $workspaceRoot = (Get-Location).Path
          }

          $client = '${{ inputs.client }}'.Trim()
          $applicationName = '${{ inputs.application_name }}'.Trim()
          $stage = '${{ inputs.stage }}'.Trim()
          $sharedTokenPathCandidates = @(
            (Join-Path (Join-Path (Join-Path $workspaceRoot 'Client') $client) (Join-Path $stage $applicationName)),
            (Join-Path (Join-Path (Join-Path $workspaceRoot 'Client') $client) $applicationName)
          )

          $sharedTokenPath = $sharedTokenPathCandidates |
            Where-Object { Test-Path (Join-Path $_ 'config-replacements.json') } |
            Select-Object -First 1

          $mergedTokens = @{}
          if (-not [string]::IsNullOrWhiteSpace($configTokens) -and $configTokens -ne '{}') {
            $existingTokens = $configTokens | ConvertFrom-Json
            foreach ($tokenProperty in $existingTokens.PSObject.Properties) {
              $mergedTokens[$tokenProperty.Name] = $tokenProperty.Value
            }
          }

          if (-not [string]::IsNullOrWhiteSpace($sharedTokenPath)) {
            $replacementPath = Join-Path $sharedTokenPath 'config-replacements.json'
            $replacementConfig = Get-Content $replacementPath -Raw | ConvertFrom-Json
            $replacementApplicationProperty = $replacementConfig.PSObject.Properties |
              Where-Object { $_.Name -ieq $applicationName } |
              Select-Object -First 1

            if ($null -ne $replacementApplicationProperty) {
              $sharedTokensProp = $replacementApplicationProperty.Value.PSObject.Properties['shared_tokens']
              if ($null -ne $sharedTokensProp) {
                foreach ($sharedToken in $sharedTokensProp.Value.PSObject.Properties) {
                  $mergedTokens[$sharedToken.Name] = $sharedToken.Value
                }
              }
            }
          }

          if (-not [string]::IsNullOrWhiteSpace($extractedPath)) {
            $mergedTokens['ReconScriptFolder'] = $extractedPath
          }

          if ($mergedTokens.Count -gt 0) {
            $configTokens = [pscustomobject]$mergedTokens | ConvertTo-Json -Depth 20 -Compress
          }

          if ([string]::IsNullOrWhiteSpace($deploymentScriptPath)) {
            Write-Host "No deployment script path provided, skipping token resolution."
            return
          }

          if ([string]::IsNullOrWhiteSpace($configTokens) -or $configTokens -eq "{}") {
            Write-Host "No replacement tokens available, deployment script path: $deploymentScriptPath"
            return
          }

          Write-Host "Original deployment script path: $deploymentScriptPath"

          try {
            $tokens = $configTokens | ConvertFrom-Json
            $tokenProperties = @($tokens.PSObject.Properties)
          } catch {
            Write-Host "Failed to parse config replacement tokens: $_"
            return
          }

          if ($tokenProperties.Count -eq 0) {
            Write-Host "No token properties found, deployment script path: $deploymentScriptPath"
            return
          }

          $resolvedPath = $deploymentScriptPath
          foreach ($token in $tokenProperties) {
            $tokenPattern = "#\{" + [regex]::Escape([string]$token.Name) + "\}"
            if ([regex]::IsMatch($resolvedPath, $tokenPattern, [System.Text.RegularExpressions.RegexOptions]::IgnoreCase)) {
              $newValue = [string]$token.Value
              $resolvedPath = [regex]::Replace(
                $resolvedPath,
                $tokenPattern,
                [System.Text.RegularExpressions.MatchEvaluator]{ param($m) $newValue },
                [System.Text.RegularExpressions.RegexOptions]::IgnoreCase
              )
              Write-Host "Resolved token '#{$($token.Name)}' to: '$newValue'"
            }
          }

          if ($resolvedPath -ne $deploymentScriptPath) {
            Write-Host "Final resolved deployment script path: $resolvedPath"
            Add-Content $env:GITHUB_ENV "DEPLOYMENT_SCRIPT_PATH=$resolvedPath"
          } else {
            Write-Host "No tokens found in deployment script path, using as-is: $deploymentScriptPath"
          }

      - name: Create failed scripts folder
        shell: powershell
        run: |
          $failedScriptsRoot = "${{ inputs.failed_scripts_root }}".Trim()

          if ([string]::IsNullOrWhiteSpace($failedScriptsRoot)) {
            $client = "${{ inputs.client }}".Trim()
            $applicationName = "${{ inputs.application_name }}".Trim()
            $stage = "${{ inputs.stage }}".Trim()
            $workspaceRoot = $Env:GITHUB_WORKSPACE
            if ([string]::IsNullOrWhiteSpace($workspaceRoot)) {
              $workspaceRoot = (Get-Location).Path
            }

            Write-Host "Resolving DatabaseFailedScripts from repo config: workspace=$workspaceRoot, client=$client, stage=$stage, application=$applicationName"

            $candidatePaths = @(
              (Join-Path (Join-Path (Join-Path (Join-Path $workspaceRoot "Client") $client) $stage) (Join-Path $applicationName "config-replacements.json")),
              (Join-Path (Join-Path (Join-Path $workspaceRoot "Client") $client) (Join-Path $applicationName "config-replacements.json"))
            )

            Write-Host "DatabaseFailedScripts lookup candidates: $($candidatePaths -join ', ')"

            $replacementPath = $candidatePaths |
              Where-Object { Test-Path $_ } |
              Select-Object -First 1

            Write-Host "DatabaseFailedScripts config path selected: $replacementPath"

            if (-not [string]::IsNullOrWhiteSpace($replacementPath)) {
              try {
                $replacementConfig = Get-Content $replacementPath -Raw | ConvertFrom-Json
                $replacementApplicationProperty = $replacementConfig.PSObject.Properties |
                  Where-Object { $_.Name -ieq $applicationName } |
                  Select-Object -First 1

                if ($null -ne $replacementApplicationProperty) {
                  $sharedTokensProp = $replacementApplicationProperty.Value.PSObject.Properties["shared_tokens"]
                  if ($null -ne $sharedTokensProp) {
                    $failedScriptsProp = $sharedTokensProp.Value.PSObject.Properties["DatabaseFailedScripts"]
                    if ($null -ne $failedScriptsProp -and -not [string]::IsNullOrWhiteSpace([string]$failedScriptsProp.Value)) {
                      $failedScriptsRoot = [string]$failedScriptsProp.Value
                    }
                  }
                }
              } catch {
                  Write-Host "Failed to resolve DatabaseFailedScripts from $($replacementPath): $_"
              }
            }

            if ([string]::IsNullOrWhiteSpace($failedScriptsRoot)) {
              Write-Host "DatabaseFailedScripts token not set, skipping failed scripts folder creation."
              Add-Content $env:GITHUB_ENV "FAILED_SCRIPTS_PATH="
              return
            }
          }

          $timestamp = (Get-Date).ToString("yyyy-MM-dd_HHmmss")
          $failedScriptsPath = [System.IO.Path]::Combine($failedScriptsRoot, $timestamp)

          $cred = New-Object PSCredential($Env:WINRM_USERNAME, (ConvertTo-SecureString $Env:WINRM_PASSWORD -AsPlainText -Force))
          Invoke-Command -ComputerName $Env:TARGET_SERVER -Credential $cred -ScriptBlock {
            New-Item -ItemType Directory -Path $using:failedScriptsPath -Force | Out-Null
            Write-Host "Created failed scripts folder: $using:failedScriptsPath"
          }

          Write-Host "Failed scripts will be copied to: $failedScriptsPath"
          Add-Content $env:GITHUB_ENV "FAILED_SCRIPTS_PATH=$failedScriptsPath"

      - name: Deploy database scripts
        id: deploy_db
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $dbServer = $Env:DB_SERVER
          $dbName = $Env:DB_NAME
          $dbAuth = $Env:DB_AUTHENTICATION
          $sqlPattern = $Env:SQL_SCRIPTS_PATTERN
          $extractedPath = $Env:EXTRACTED_PACKAGE_PATH
          $displaySqlOutput = $Env:DISPLAY_SQL_OUTPUT
          $trustCert = $Env:TRUST_SERVER_CERTIFICATE
          $dbUsername = $Env:DB_USERNAME
          $dbPassword = $Env:DB_PASSWORD
          $deployScript = $Env:DEPLOYMENT_SCRIPT_PATH
          $failedScriptsPath = $Env:FAILED_SCRIPTS_PATH
          $cred = New-Object PSCredential($Env:WINRM_USERNAME, (ConvertTo-SecureString $Env:WINRM_PASSWORD -AsPlainText -Force))

          Write-Host "Deploying database scripts to $dbName on $dbServer"
          Write-Host "Target server: $Env:TARGET_SERVER"
          Write-Host "Deployment script: $deployScript"

          if ([string]::IsNullOrWhiteSpace($deployScript)) {
            throw "Deployment script path is empty or not set"
          }

          try {
            $resolvedDeployScript = Invoke-Command -ComputerName $Env:TARGET_SERVER -Credential $cred -ErrorAction Stop -ScriptBlock {
              $ErrorActionPreference = 'Stop'
              $global:OctopusParameters = @{
                "serverInstance"                                                               = $using:dbServer
                "dbName"                                                                       = $using:dbName
                "Authentication"                                                               = $using:dbAuth
                "SQLScripts"                                                                   = $using:sqlPattern
                "ExtractedPackagePath"                                                         = $using:extractedPath
                "ExecuteSQL.DisplaySQLServerOutput"                                            = $using:displaySqlOutput
                "ExecuteSQL.TrustServerCertificate"                                            = $using:trustCert
                "SQLUsername"                                                                  = $using:dbUsername
                "SQLPassword"                                                                  = $using:dbPassword
                "FailedScriptsPath"                                                            = $using:failedScriptsPath
                "Octopus.Action[Extract Database scripts package].Output.ExtractedPackageVersion" = ""
              }

              Write-Host "Server: $($global:OctopusParameters['serverInstance'])"
              Write-Host "Database: $($global:OctopusParameters['dbName'])"
              Write-Host "Authentication: $($global:OctopusParameters['Authentication'])"
              Write-Host "Extracted Package Path: $($global:OctopusParameters['ExtractedPackagePath'])"

              $configuredDeployScript = [string]$using:deployScript
              $resolvedDeployScript = $configuredDeployScript
              $hasWildcard = $configuredDeployScript -match '[\*\?]'

              if ($hasWildcard -or -not (Test-Path -LiteralPath $resolvedDeployScript)) {
                if ($hasWildcard) {
                  Write-Warning "Configured deployment script path contains wildcard and cannot be executed directly: $configuredDeployScript"
                } else {
                  Write-Warning "Deployment script not found at configured path: $configuredDeployScript"
                }

                $scriptRoot = Split-Path -Path $configuredDeployScript -Parent
                $scriptFilter = Split-Path -Path $configuredDeployScript -Leaf

                if ([string]::IsNullOrWhiteSpace($scriptRoot)) {
                  $scriptRoot = [System.IO.Path]::GetDirectoryName($configuredDeployScript)
                }

                if ([string]::IsNullOrWhiteSpace($scriptRoot) -or [string]::IsNullOrWhiteSpace($scriptFilter)) {
                  throw "Cannot extract parent directory from deployment script path: $configuredDeployScript"
                }

                $searchRoots = @()
                if (Test-Path -LiteralPath $scriptRoot) {
                  $searchRoots += $scriptRoot
                }

                $extractedRoot = [string]$global:OctopusParameters['ExtractedPackagePath']
                if (-not [string]::IsNullOrWhiteSpace($extractedRoot) -and
                    (Test-Path -LiteralPath $extractedRoot) -and
                    ($searchRoots -notcontains $extractedRoot)) {
                  $searchRoots += $extractedRoot
                }

                Write-Host "Attempting auto-discovery under: $($searchRoots -join ', ')"

                $candidates = @()
                foreach ($root in $searchRoots) {
                  Write-Host "Searching deployment script under: $root"

                  if (-not [string]::IsNullOrWhiteSpace($scriptFilter)) {
                    Write-Host "Searching with configured filter: $scriptFilter"
                    $candidates = Get-ChildItem -Path $root -Recurse -File -Filter $scriptFilter -ErrorAction SilentlyContinue |
                      Sort-Object FullName
                  }

                  if ($candidates.Count -eq 0) {
                    $candidates = Get-ChildItem -Path $root -Recurse -File -Filter "*DatabaseScripts*Script*.ps1" -ErrorAction SilentlyContinue |
                      Sort-Object FullName
                  }

                  if ($candidates.Count -eq 0) {
                    $candidates = Get-ChildItem -Path $root -Recurse -File -Filter "*.ps1" -ErrorAction SilentlyContinue |
                      Sort-Object FullName
                  }

                  if ($candidates.Count -gt 0) {
                    break
                  }
                }

                if ($candidates.Count -gt 0) {
                  $resolvedDeployScript = $candidates[0].FullName
                  Write-Host "Using discovered deployment script: $resolvedDeployScript"
                } else {
                  $searchedRoots = if ($searchRoots.Count -gt 0) { $searchRoots -join ', ' } else { '<none>' }
                  throw "Deployment script not found at: $configuredDeployScript (and no alternatives found under: $searchedRoots)"
                }
              }

              if (-not (Test-Path -LiteralPath $resolvedDeployScript)) {
                throw "Deployment script does not exist: $resolvedDeployScript"
              }

              $resolvedDeployScript
            }
          }
          catch {
            throw "Database deployment failed while resolving the deployment script: $($_.Exception.Message)"
          }

          if ([string]::IsNullOrWhiteSpace($resolvedDeployScript)) {
            throw "Resolved deployment script path is empty after lookup."
          }

          Add-Content $env:GITHUB_ENV "RESOLVED_DEPLOYMENT_SCRIPT=$resolvedDeployScript"

          Write-Host "Executing deployment script: $resolvedDeployScript"

          try {
            Invoke-Command -ComputerName $Env:TARGET_SERVER -Credential $cred -ErrorAction Stop -ScriptBlock {
              $ErrorActionPreference = 'Stop'
              $global:OctopusParameters = @{
                "serverInstance"                                                               = $using:dbServer
                "dbName"                                                                       = $using:dbName
                "Authentication"                                                               = $using:dbAuth
                "SQLScripts"                                                                   = $using:sqlPattern
                "ExtractedPackagePath"                                                         = $using:extractedPath
                "ExecuteSQL.DisplaySQLServerOutput"                                            = $using:displaySqlOutput
                "ExecuteSQL.TrustServerCertificate"                                            = $using:trustCert
                "SQLUsername"                                                                  = $using:dbUsername
                "SQLPassword"                                                                  = $using:dbPassword
                "FailedScriptsPath"                                                            = $using:failedScriptsPath
                "Octopus.Action[Extract Database scripts package].Output.ExtractedPackageVersion" = ""
              }

              Write-Host "Server: $($global:OctopusParameters['serverInstance'])"
              Write-Host "Database: $($global:OctopusParameters['dbName'])"
              Write-Host "Authentication: $($global:OctopusParameters['Authentication'])"
              Write-Host "Extracted Package Path: $($global:OctopusParameters['ExtractedPackagePath'])"

              if (-not (Test-Path -LiteralPath $using:resolvedDeployScript)) {
                throw "Deployment script does not exist: $($using:resolvedDeployScript)"
              }

              & $using:resolvedDeployScript

              Write-Host "Database scripts deployment completed successfully"
            }
          }
          catch {
            throw "Database deployment failed: $($_.Exception.Message)"
          }

      - name: Copy failed scripts on error
        if: failure()
        shell: powershell
        run: |
          $failedScriptsPath = $Env:FAILED_SCRIPTS_PATH
          $extractedPath = $Env:EXTRACTED_PACKAGE_PATH
          $resolvedDeployScript = $Env:RESOLVED_DEPLOYMENT_SCRIPT

          if ([string]::IsNullOrWhiteSpace($failedScriptsPath)) {
            Write-Host "No failed scripts path configured, skipping copy."
            return
          }

          if ([string]::IsNullOrWhiteSpace($extractedPath)) {
            Write-Host "No extracted package path set, skipping failed scripts copy."
            return
          }

          $cred = New-Object PSCredential($Env:WINRM_USERNAME, (ConvertTo-SecureString $Env:WINRM_PASSWORD -AsPlainText -Force))
          Invoke-Command -ComputerName $Env:TARGET_SERVER -Credential $cred -ScriptBlock {
            $src = $using:extractedPath
            $dest = $using:failedScriptsPath

            if (-not (Test-Path $src)) {
              Write-Host "Extracted path not found on remote, cannot copy failed scripts: $src"
              return
            }

            $sqlFiles = Get-ChildItem -Path $src -Recurse -File -Filter "*.sql" -ErrorAction SilentlyContinue
            if ($sqlFiles.Count -eq 0) {
              Write-Host "No SQL files found under extracted package. Falling back to deployment script: $using:resolvedDeployScript"

              if ([string]::IsNullOrWhiteSpace($using:resolvedDeployScript)) {
                Write-Host "No resolved deployment script path available, nothing to copy."
                return
              }

              if (-not (Test-Path $using:resolvedDeployScript)) {
                Write-Host "Resolved deployment script not found: $using:resolvedDeployScript"
                return
              }

              $scriptLeaf = Split-Path -Path $using:resolvedDeployScript -Leaf
              $scriptDest = Join-Path $dest $scriptLeaf
              Copy-Item -Path $using:resolvedDeployScript -Destination $scriptDest -Force
              Write-Host "Copied deployment script to failed scripts folder: $scriptDest"
              return
            }

            foreach ($file in $sqlFiles) {
              $relativePath = $file.FullName.Substring($src.TrimEnd('\').Length).TrimStart('\')
              $destFile = Join-Path $dest $relativePath
              $destDir = Split-Path $destFile -Parent
              if (-not (Test-Path $destDir)) {
                New-Item -ItemType Directory -Path $destDir -Force | Out-Null
              }
              Copy-Item -Path $file.FullName -Destination $destFile -Force
            }

            Write-Host "Copied $($sqlFiles.Count) SQL script(s) to failed scripts folder: $dest"
          }

      - name: Deploy SSRS reports
        if: ${{ inputs.ssrs_enabled == 'true' }}
        shell: powershell
        run: |
          $ssrsVars = @{
            SSRS_ENABLED                       = $Env:SSRS_ENABLED
            SSRS_REPORT_PACKAGE                = $Env:SSRS_REPORT_PACKAGE
            SSRS_REPORT_PACKAGE_SOURCE_ROOT    = $Env:SSRS_REPORT_PACKAGE_SOURCE_ROOT
            SSRS_EXTRACT_ROOT                  = $Env:SSRS_EXTRACT_ROOT
            SSRS_REPORT_SERVICE_URL            = $Env:SSRS_REPORT_SERVICE_URL
            SSRS_REPORT_EXECUTION_URL          = $Env:SSRS_REPORT_EXECUTION_URL
            SSRS_REPORT_FOLDER                 = $Env:SSRS_REPORT_FOLDER
            SSRS_DATASOURCE_FOLDER             = $Env:SSRS_DATASOURCE_FOLDER
            SSRS_DATASET_FOLDER                = $Env:SSRS_DATASET_FOLDER
            SSRS_PARTS_FOLDER                  = $Env:SSRS_PARTS_FOLDER
            SSRS_ROOT_FOLDER                   = $Env:SSRS_ROOT_FOLDER
            SSRS_BACKUP_LOCATION               = $Env:SSRS_BACKUP_LOCATION
            SSRS_OVERWRITE_DATA_SOURCES        = $Env:SSRS_OVERWRITE_DATA_SOURCES
            SSRS_CLEAR_REPORT_FOLDER           = $Env:SSRS_CLEAR_REPORT_FOLDER
            SSRS_USE_ARCHIVE_STRUCTURE         = $Env:SSRS_USE_ARCHIVE_STRUCTURE
            SSRS_FAIL_ON_UNRESOLVED_REFERENCES = $Env:SSRS_FAIL_ON_UNRESOLVED_REFERENCES
            SSRS_SERVICE_USER_NAME             = $Env:SSRS_SERVICE_USER_NAME
            SSRS_SERVICE_PASSWORD              = $Env:SSRS_SERVICE_PASSWORD
          }
          $ssrsScriptContent = Get-Content ".github\scripts\deploy-ssrs-reports.ps1" -Raw
          $cred = New-Object PSCredential($Env:WINRM_USERNAME, (ConvertTo-SecureString $Env:WINRM_PASSWORD -AsPlainText -Force))

          Invoke-Command -ComputerName $Env:TARGET_SERVER -Credential $cred -ScriptBlock {
            $ssrsVarsLocal = $using:ssrsVars
            foreach ($kv in $ssrsVarsLocal.GetEnumerator()) {
              Set-Item "env:$($kv.Key)" $kv.Value
            }
            Invoke-Expression $using:ssrsScriptContent
          }

      - name: Cleanup extracted files
        if: always()
        shell: powershell
        run: |
          $extractedPath = $env:EXTRACTED_PACKAGE_PATH
          if ([string]::IsNullOrWhiteSpace($extractedPath)) {
            Write-Host "No extracted package path set, skipping cleanup."
            return
          }
          $cred = New-Object PSCredential($Env:WINRM_USERNAME, (ConvertTo-SecureString $Env:WINRM_PASSWORD -AsPlainText -Force))
          Invoke-Command -ComputerName $Env:TARGET_SERVER -Credential $cred -ScriptBlock {
            if (Test-Path $using:extractedPath) {
              Write-Host "Cleaning up extracted files: $using:extractedPath"
              Remove-Item -Path $using:extractedPath -Recurse -Force -ErrorAction SilentlyContinue
            }
          }

