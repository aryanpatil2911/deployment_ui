name: Reusable IIS Deploy

on:
  workflow_call:
    inputs:
      application_name:
        required: true
        type: string
      stage:
        required: true
        type: string
      package_name:
        required: true
        type: string
      package_source_root:
        required: true
        type: string
      deploy_path:
        required: true
        type: string
      backup_path:
        required: true
        type: string
      iis_site_name:
        required: true
        type: string
      iis_parent_site:
        required: false
        type: string
        default: Default Web Site
      iis_app_pool:
        required: true
        type: string
      iis_service_user:
        required: true
        type: string
      github_runner:
        required: true
        type: string
      config_replacements_enabled:
        required: false
        type: string
        default: "false"
      config_replacement_file_patterns:
        required: false
        type: string
        default: ""
      config_replacement_tokens:
        required: false
        type: string
        default: "{}"
      iis_app_pool_clr_version:
        required: false
        type: string
        default: "v4.0"
      target_server:
        required: true
        type: string
      winrm_username:
        required: true
        type: string
      client:
        required: true
        type: string
      target_server_role:
        required: true
        type: string
    secrets:
      iis_service_password:
        required: true
      winrm_password:
        required: true
      sftp_host:
        required: true
      sftp_username:
        required: true
      sftp_password:
        required: true

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy ${{ inputs.application_name }} / ${{ inputs.iis_site_name }} to ${{ inputs.stage }}
    runs-on: ${{ fromJSON(inputs.github_runner) }}
    env:
      APPLICATION: ${{ inputs.application_name }}
      PACKAGE_SOURCE_ROOT: ${{ inputs.package_source_root }}
      DEPLOY_PATH: ${{ inputs.deploy_path }}
      BACKUP_PATH: ${{ inputs.backup_path }}
      IIS_SITE_NAME: ${{ inputs.iis_site_name }}
      IIS_PARENT_SITE: ${{ inputs.iis_parent_site }}
      IIS_APP_POOL: ${{ inputs.iis_app_pool }}
      IIS_SERVICE_USER: ${{ inputs.iis_service_user }}
      IIS_APP_POOL_CLR_VERSION: ${{ inputs.iis_app_pool_clr_version }}
      CONFIG_REPLACEMENTS_ENABLED: ${{ inputs.config_replacements_enabled }}
      CONFIG_REPLACEMENT_FILE_PATTERNS: ${{ inputs.config_replacement_file_patterns }}
      CONFIG_REPLACEMENT_TOKENS: ${{ inputs.config_replacement_tokens }}
      TARGET_SERVER: ${{ inputs.target_server }}
      WINRM_USERNAME: ${{ inputs.winrm_username }}
      WINRM_PASSWORD: ${{ secrets.winrm_password }}
      SFTP_HOST: ${{ secrets.sftp_host }}
      SFTP_USERNAME: ${{ secrets.sftp_username }}
      SFTP_PASSWORD: ${{ secrets.sftp_password }}

    steps:
      - name: Set PowerShell execution policy
        shell: powershell
        run: |
          Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Scope Process -Force

      - name: Resolve WinRM password for client
        shell: powershell
        env:
          WINRM_PASSWORDS_JSON: ${{ secrets.winrm_password }}
        run: |
          $client = '${{ inputs.client }}'
          $serverType = '${{ inputs.target_server_role }}'
          if ([string]::IsNullOrWhiteSpace($env:WINRM_PASSWORDS_JSON)) {
            Write-Error "winrm_password secret is empty - ensure QA/UAT/PROD_WINRM_PASSWORDS secret exists in GitHub"
            exit 1
          }
          $allPwds = $env:WINRM_PASSWORDS_JSON | ConvertFrom-Json
          Write-Host "DEBUG: Top-level client keys in secret: $($allPwds.PSObject.Properties.Name -join ', ')"
          $clientObj = $allPwds.$client
          if ($null -eq $clientObj) {
            Write-Error "No entry found for client '$client' in WinRM passwords secret. Available keys: $($allPwds.PSObject.Properties.Name -join ', ')"
            exit 1
          }
          Write-Host "DEBUG: Roles available for client '$client': $($clientObj.PSObject.Properties.Name -join ', ')"
          $pwd = $clientObj.$serverType
          if ([string]::IsNullOrWhiteSpace($pwd)) {
            Write-Error "No winrm_password entry found for client '$client' / target_server_role '$serverType'. Available roles: $($clientObj.PSObject.Properties.Name -join ', ')"
            exit 1
          }
          Write-Output "::add-mask::$pwd"
          Add-Content $env:GITHUB_ENV "WINRM_PASSWORD=$pwd"

      - name: Resolve IIS service password for client
        shell: powershell
        env:
          IIS_SERVICE_PASSWORDS_JSON: ${{ secrets.iis_service_password }}
        run: |
          $client = '${{ inputs.client }}'
          $serverType = '${{ inputs.target_server_role }}'
          if ([string]::IsNullOrWhiteSpace($Env:IIS_SERVICE_USER)) {
            Write-Host "No IIS service user provided; skipping IIS service password resolution for configuration-only deployment."
            Add-Content $env:GITHUB_ENV "IIS_SERVICE_PASSWORD="
            exit 0
          }
          $allPwds = $env:IIS_SERVICE_PASSWORDS_JSON | ConvertFrom-Json
          $pwd = $allPwds.$client.$serverType
          if ([string]::IsNullOrWhiteSpace($pwd)) {
            Write-Error "No iis_service_password entry found for client '$client' / target_server_role '$serverType' in the IIS service passwords secret"
            exit 1
          }
          Write-Output "::add-mask::$pwd"
          Add-Content $env:GITHUB_ENV "IIS_SERVICE_PASSWORD=$pwd"

      - name: Validate inputs
        shell: powershell
        run: |
          $iisDeployment = -not [string]::IsNullOrWhiteSpace($Env:IIS_SITE_NAME) -and -not [string]::IsNullOrWhiteSpace($Env:IIS_APP_POOL)
          @("PACKAGE_SOURCE_ROOT","DEPLOY_PATH","BACKUP_PATH","TARGET_SERVER","WINRM_USERNAME","WINRM_PASSWORD") | ForEach-Object {
            if (-not (Test-Path "env:$_")) {
              Write-Error "$_ is not set"
              exit 1
            }

            if ([string]::IsNullOrWhiteSpace((Get-Item "env:$_").Value)) {
              Write-Error "$_ is empty"
              exit 1
            }
          }

          if ($iisDeployment) {
            @("IIS_SITE_NAME","IIS_PARENT_SITE","IIS_APP_POOL","IIS_SERVICE_USER","IIS_SERVICE_PASSWORD") | ForEach-Object {
              if (-not (Test-Path "env:$_")) {
                Write-Error "$_ is not set"
                exit 1
              }

              if ([string]::IsNullOrWhiteSpace((Get-Item "env:$_").Value)) {
                Write-Error "$_ is empty"
                exit 1
              }
            }
          } else {
            Write-Host "IIS settings not provided; treating this as a configuration-only deployment."
          }

          $cred = New-Object PSCredential($Env:WINRM_USERNAME, (ConvertTo-SecureString $Env:WINRM_PASSWORD -AsPlainText -Force))
          if (-not (Test-WSMan -ComputerName $Env:TARGET_SERVER -Credential $cred -Authentication Default -ErrorAction SilentlyContinue)) {
            Write-Error "Cannot connect to target server via WinRM: $Env:TARGET_SERVER"
            exit 1
          }
          Write-Host "WinRM connectivity verified for: $Env:TARGET_SERVER"

      - name: Download package from SFTP
        shell: powershell
        run: |
          $packageName = "${{ inputs.package_name }}".Trim()
          $packageSourceRoot = $Env:PACKAGE_SOURCE_ROOT
          $sftpHost = $Env:SFTP_HOST
          $sftpUsername = $Env:SFTP_USERNAME
          $sftpPassword = $Env:SFTP_PASSWORD
          $stagingFolder = $packageSourceRoot
          $remotePath = "/Dev_files/Release/$packageName"
          $cred = New-Object PSCredential($Env:WINRM_USERNAME, (ConvertTo-SecureString $Env:WINRM_PASSWORD -AsPlainText -Force))

          # Step 1: Download file to runner's local temp using Posh-SSH (avoids running SSH inside WinRM)
          if (-not (Get-Module -ListAvailable -Name Posh-SSH)) {
            Write-Host "Installing Posh-SSH on runner..."
            [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
            Install-PackageProvider -Name NuGet -MinimumVersion 2.8.5.201 -Force -Scope CurrentUser | Out-Null
            Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
            Install-Module Posh-SSH -Force -Scope CurrentUser -AllowClobber
          }
          Import-Module Posh-SSH

          $localTempFolder = Join-Path $env:TEMP "sftp_download"
          if (-not (Test-Path $localTempFolder)) {
            New-Item -ItemType Directory -Path $localTempFolder -Force | Out-Null
          }

          Write-Host "Downloading $packageName from SFTP $sftpHost"
          Write-Host "Posh-SSH version: $(Get-Module -Name Posh-SSH | Select-Object -ExpandProperty Version)"
          $sftpCred = New-Object PSCredential($sftpUsername, (ConvertTo-SecureString $sftpPassword -AsPlainText -Force))
          $sftpSession = New-SFTPSession -ComputerName $sftpHost -Credential $sftpCred -AcceptKey
          try {
            $poshVersion = (Get-Module -Name Posh-SSH).Version.Major
            if ($poshVersion -ge 3) {
              Get-SFTPItem -SessionId $sftpSession.SessionId -Path $remotePath -Destination $localTempFolder -Force
            } else {
              Get-SFTPFile -SessionId $sftpSession.SessionId -RemoteFile $remotePath -LocalPath $localTempFolder -Overwrite
            }
            Write-Host "Downloaded to runner temp: $localTempFolder\$packageName"
          } finally {
            Remove-SFTPSession -SessionId $sftpSession.SessionId | Out-Null
          }

          $localPackagePath = Join-Path $localTempFolder $packageName

          # Step 2: Copy from runner to target server via PSSession (chunked, reliable for large files)
          Write-Host "Copying $packageName to $Env:TARGET_SERVER via PSSession"
          $sessionOptions = New-PSSessionOption -OperationTimeout 0 -IdleTimeout 3600000
          $remoteSession = New-PSSession -ComputerName $Env:TARGET_SERVER -Credential $cred -SessionOption $sessionOptions
          try {
            Invoke-Command -Session $remoteSession -ScriptBlock {
              if (-not (Test-Path $using:stagingFolder)) {
                New-Item -ItemType Directory -Path $using:stagingFolder -Force | Out-Null
                Write-Host "Created staging folder: $using:stagingFolder"
              }
            }

            $destStagingPath = $stagingFolder.TrimEnd('\') + '\' + $packageName
            Copy-Item -Path $localPackagePath -Destination $destStagingPath -ToSession $remoteSession -Force
            Write-Host "Copied to package cache: $destStagingPath on $Env:TARGET_SERVER"
          } finally {
            Remove-PSSession $remoteSession
          }

          Remove-Item $localPackagePath -Force -ErrorAction SilentlyContinue
          Add-Content $env:GITHUB_ENV "PACKAGE_SOURCE_ROOT=$stagingFolder"

      - name: Find package
        shell: powershell
        run: |
          $packageName = "${{ inputs.package_name }}".Trim()
          $packageSourceRoot = $Env:PACKAGE_SOURCE_ROOT
          $cred = New-Object PSCredential($Env:WINRM_USERNAME, (ConvertTo-SecureString $Env:WINRM_PASSWORD -AsPlainText -Force))

          Write-Host "Package source root: $packageSourceRoot"
          Write-Host "Requested package: $packageName"
          Write-Host "Target server: $Env:TARGET_SERVER"

          $packagePath = Invoke-Command -ComputerName $Env:TARGET_SERVER -Credential $cred -ScriptBlock {
            if (-not (Test-Path $using:packageSourceRoot)) {
              throw "Package source path not found: $using:packageSourceRoot"
            }
            $packages = Get-ChildItem -Path $using:packageSourceRoot -Recurse -File -Filter "*.nupkg"
            $package = $packages | Where-Object { $_.Name -eq $using:packageName } | Select-Object -First 1
            if (-not $package) {
              Write-Host "Package was not found. Available .nupkg files under package source root:"
              $packages | Select-Object -First 50 FullName | ForEach-Object { Write-Host " - $($_.FullName)" }
              throw "Package not found: $using:packageName under $using:packageSourceRoot"
            }
            Write-Host "Found package: $($package.FullName)"
            $package.FullName
          }

          Add-Content $env:GITHUB_ENV "PACKAGE_PATH=$packagePath"

      - name: Stop app pool
        shell: powershell
        run: |
          if ([string]::IsNullOrWhiteSpace($Env:IIS_SITE_NAME) -or [string]::IsNullOrWhiteSpace($Env:IIS_APP_POOL)) {
            Write-Host "Skipping app pool stop for configuration-only deployment."
            exit 0
          }

          $appPool = $Env:IIS_APP_POOL
          $parentSite = $Env:IIS_PARENT_SITE
          $cred = New-Object PSCredential($Env:WINRM_USERNAME, (ConvertTo-SecureString $Env:WINRM_PASSWORD -AsPlainText -Force))

          Invoke-Command -ComputerName $Env:TARGET_SERVER -Credential $cred -ScriptBlock {
            Import-Module WebAdministration

            $website = Get-Website -Name $using:parentSite -ErrorAction SilentlyContinue
            if ($null -ne $website -and $website.State -ne 'Stopped') {
              Stop-Website -Name $using:parentSite
              Write-Host "Website '$using:parentSite' stopped."
            } elseif ($null -ne $website) {
              Write-Host "Website '$using:parentSite' was already stopped."
            } else {
              Write-Host "Website '$using:parentSite' not found, skipping stop."
            }

            if (Get-ChildItem IIS:\AppPools | Where-Object { $_.Name -eq $using:appPool }) {
              $state = (Get-WebAppPoolState -Name $using:appPool).Value
              if ($state -ne 'Stopped') {
                Stop-WebAppPool -Name $using:appPool
                Write-Host "App pool '$using:appPool' stopped."
              } else {
                Write-Host "App pool '$using:appPool' was already stopped."
              }
            } else {
              Write-Host "App pool '$using:appPool' not found, skipping stop."
            }
          }

      - name: Backup existing deployment
        shell: powershell
        run: |
          $deployPath = $Env:DEPLOY_PATH
          $backupPath = $Env:BACKUP_PATH
          $cred = New-Object PSCredential($Env:WINRM_USERNAME, (ConvertTo-SecureString $Env:WINRM_PASSWORD -AsPlainText -Force))

          Invoke-Command -ComputerName $Env:TARGET_SERVER -Credential $cred -ScriptBlock {
            if (Test-Path $using:deployPath) {
              $timestamp = Get-Date -Format "yyyyMMdd-HHmmss"
              $backupDir = Join-Path $using:backupPath $timestamp
              New-Item -ItemType Directory -Path $backupDir -Force | Out-Null
              Copy-Item -Path "$using:deployPath\*" -Destination $backupDir -Recurse -Force
              Write-Host "Backup completed to: $backupDir"
            } else {
              Write-Host "No existing deployment at $using:deployPath, skipping backup."
            }
          }

      - name: Cleanup deployment directory
        shell: powershell
        run: |
          $deployPath = $Env:DEPLOY_PATH
          $cred = New-Object PSCredential($Env:WINRM_USERNAME, (ConvertTo-SecureString $Env:WINRM_PASSWORD -AsPlainText -Force))

          Invoke-Command -ComputerName $Env:TARGET_SERVER -Credential $cred -ScriptBlock {
            if (-not (Test-Path $using:deployPath)) {
              Write-Host "Deployment path does not exist yet, skipping cleanup: $using:deployPath"
              return
            }

            Write-Host "Force-cleaning deployment directory: $using:deployPath"

            try {
              # Single bulk attrib call across entire tree - much faster than per-file loop.
              cmd /c "attrib -r -s -h `"$using:deployPath`" /S /D" | Out-Null

              # Use rd /s /q (fastest native Windows deletion) then recreate the directory.
              cmd /c "rd /s /q `"$using:deployPath`"" | Out-Null

              if (Test-Path $using:deployPath) {
                # rd left something behind - fall back to .NET recursive delete.
                [System.IO.Directory]::Delete($using:deployPath, $true)
              }

              if (Test-Path $using:deployPath) {
                $remaining = @(Get-ChildItem -Path $using:deployPath -Force -ErrorAction SilentlyContinue)
                $sample = $remaining | Select-Object -First 10 -ExpandProperty FullName
                Write-Warning "Failed to fully clean deployment directory. Remaining items: $($sample -join ', ')"
                Write-Warning "Proceeding with deployment despite cleanup failure."
              }

              if (-not (Test-Path $using:deployPath)) {
                New-Item -ItemType Directory -Path $using:deployPath -Force | Out-Null
              }

              Write-Host "Deployment directory cleanup completed."
            } catch {
              Write-Warning "Cleanup step encountered an error and will continue: $($_.Exception.Message)"
              if (-not (Test-Path $using:deployPath)) {
                New-Item -ItemType Directory -Path $using:deployPath -Force | Out-Null
              }
            }
          }

      - name: Deploy package
        shell: powershell
        run: |
          $deployPath = $Env:DEPLOY_PATH
          $packagePath = $Env:PACKAGE_PATH
          $cred = New-Object PSCredential($Env:WINRM_USERNAME, (ConvertTo-SecureString $Env:WINRM_PASSWORD -AsPlainText -Force))

          Invoke-Command -ComputerName $Env:TARGET_SERVER -Credential $cred -ScriptBlock {
            New-Item -ItemType Directory -Path $using:deployPath -Force | Out-Null

            $tempZip = Join-Path $env:TEMP "deploy_package.zip"
            Copy-Item $using:packagePath $tempZip -Force
            Expand-Archive -Path $tempZip -DestinationPath $using:deployPath -Force
            Remove-Item $tempZip -Force
            Write-Host "Package deployed to: $using:deployPath"
          }

      - name: Replace configuration tokens
        shell: powershell
        run: |
          $configEnabled = $Env:CONFIG_REPLACEMENTS_ENABLED
          $configTokens = $Env:CONFIG_REPLACEMENT_TOKENS
          $configPatterns = $Env:CONFIG_REPLACEMENT_FILE_PATTERNS
          $deployPath = $Env:DEPLOY_PATH
          $workspaceRoot = $Env:GITHUB_WORKSPACE
          if ([string]::IsNullOrWhiteSpace($workspaceRoot)) {
            $workspaceRoot = (Get-Location).Path
          }

          $client = '${{ inputs.client }}'.Trim()
          $applicationName = '${{ inputs.application_name }}'.Trim()
          $stage = '${{ inputs.stage }}'.Trim()
          $sharedTokenPathCandidates = @(
            (Join-Path (Join-Path (Join-Path $workspaceRoot 'Client') $client) (Join-Path $stage $applicationName)),
            (Join-Path (Join-Path (Join-Path $workspaceRoot 'Client') $client) $applicationName)
          )

          $sharedTokenPath = $sharedTokenPathCandidates |
            Where-Object { Test-Path (Join-Path $_ 'config-replacements.json') } |
            Select-Object -First 1

          $mergedTokens = @{}
          if (-not [string]::IsNullOrWhiteSpace($configTokens) -and $configTokens -ne '{}') {
            $existingTokens = $configTokens | ConvertFrom-Json
            foreach ($tokenProperty in $existingTokens.PSObject.Properties) {
              $mergedTokens[$tokenProperty.Name] = $tokenProperty.Value
            }
          }

          if (-not [string]::IsNullOrWhiteSpace($sharedTokenPath)) {
            $replacementPath = Join-Path $sharedTokenPath 'config-replacements.json'
            $replacementConfig = Get-Content $replacementPath -Raw | ConvertFrom-Json
            $replacementApplicationProperty = $replacementConfig.PSObject.Properties |
              Where-Object { $_.Name -ieq $applicationName } |
              Select-Object -First 1

            if ($null -ne $replacementApplicationProperty) {
              $sharedTokensProp = $replacementApplicationProperty.Value.PSObject.Properties['shared_tokens']
              if ($null -ne $sharedTokensProp) {
                foreach ($sharedToken in $sharedTokensProp.Value.PSObject.Properties) {
                  $mergedTokens[$sharedToken.Name] = $sharedToken.Value
                }
              }
            }
          }

          if ($mergedTokens.Count -gt 0) {
            $configTokens = [pscustomobject]$mergedTokens | ConvertTo-Json -Depth 20 -Compress
            Write-Host "Merged config replacement token keys: $((@($mergedTokens.Keys) | Sort-Object) -join ', ')"
          } else {
            Write-Host "No merged config replacement tokens were found after loading repo config."
          }

          $cred = New-Object PSCredential($Env:WINRM_USERNAME, (ConvertTo-SecureString $Env:WINRM_PASSWORD -AsPlainText -Force))

          $configTokensJson = $configTokens

          Invoke-Command -ComputerName $Env:TARGET_SERVER -Credential $cred -ArgumentList $configEnabled, $configTokensJson, $configPatterns, $deployPath -ScriptBlock {
            param(
              [string]$configEnabled,
              [string]$configTokensJson,
              [string]$configPatterns,
              [string]$deployPath
            )

            if ($configEnabled -ne "true") {
              Write-Host "Config replacements are disabled for this component."
              return
            }

            if ([string]::IsNullOrWhiteSpace($configTokensJson) -or $configTokensJson -eq "{}") {
              Write-Host "Config replacements enabled, but no tokens were provided."
              return
            }

            $tokens = $configTokensJson | ConvertFrom-Json
            $tokenProperties = @($tokens.PSObject.Properties)
            if ($tokenProperties.Count -eq 0) {
              Write-Host "Config replacements enabled, but no token properties were found."
              return
            }

            $patterns = @($configPatterns -split "`r?`n") |
              ForEach-Object { $_.Trim() } |
              Where-Object { -not [string]::IsNullOrWhiteSpace($_) } |
              Select-Object -Unique

            if ($patterns.Count -eq 0) { $patterns = @("*.json", "appsettings.json", "web.config") }

            $filesByPath = @{}
            foreach ($pattern in $patterns) {
              $filePattern = $pattern
              if ($filePattern.StartsWith("**\")) { $filePattern = $filePattern.Substring(3) }
              if ($filePattern -like "*\*") { $filePattern = Split-Path -Path $filePattern -Leaf }
              Get-ChildItem -Path $deployPath -Recurse -File -Filter $filePattern -ErrorAction SilentlyContinue |
                ForEach-Object { $filesByPath[$_.FullName] = $_ }
            }

            if ($filesByPath.Count -eq 0) {
              Write-Host "No files matched config replacement patterns under $deployPath."
              return
            }

            $updatedFileCount = 0
            $partialFileCount = 0
            foreach ($file in $filesByPath.Values) {
              $reader = [System.IO.StreamReader]::new($file.FullName, $true)
              try { $content = $reader.ReadToEnd(); $encoding = $reader.CurrentEncoding } finally { $reader.Close() }
              $updatedContent = $content
              $replacedTokens = @()
              foreach ($token in $tokenProperties) {
                $placeholder = "#{$($token.Name)}"
                if ($updatedContent.Contains($placeholder)) {
                  $updatedContent = $updatedContent.Replace($placeholder, [string]$token.Value)
                  $replacedTokens += $token.Name
                }
              }
              if ($updatedContent -ne $content) {
                [System.IO.File]::WriteAllText($file.FullName, $updatedContent, $encoding)
                $remaining = @([regex]::Matches($updatedContent, '#\{[^}]+\}') | ForEach-Object { $_.Value } | Sort-Object -Unique)
                if ($remaining.Count -gt 0) {
                  $partialFileCount++
                  Write-Host "Partially replaced tokens in: $($file.FullName)"
                  Write-Host "  Replaced: $((@($replacedTokens) | Sort-Object -Unique) -join ', ')"
                  Write-Host "  Remaining: $($remaining -join ', ')"
                } else {
                  $updatedFileCount++
                  Write-Host "Updated tokens in: $($file.FullName)"
                  Write-Host "  Replaced: $((@($replacedTokens) | Sort-Object -Unique) -join ', ')"
                }
              }
            }
            Write-Host "Config replacement completed. Fully updated: $updatedFileCount; partially updated: $partialFileCount"
          }

      - name: Configure IIS and start app pool
        shell: powershell
        run: |
          if ([string]::IsNullOrWhiteSpace($Env:IIS_SITE_NAME) -or [string]::IsNullOrWhiteSpace($Env:IIS_APP_POOL)) {
            Write-Host "Skipping IIS configuration and app pool start for configuration-only deployment."
            exit 0
          }

          $appPool = $Env:IIS_APP_POOL
          $appPoolClrVersion = $Env:IIS_APP_POOL_CLR_VERSION
          $serviceUser = $Env:IIS_SERVICE_USER
          $servicePassword = $Env:IIS_SERVICE_PASSWORD
          $siteName = $Env:IIS_SITE_NAME
          $parentSite = $Env:IIS_PARENT_SITE
          $deployPath = $Env:DEPLOY_PATH
          $cred = New-Object PSCredential($Env:WINRM_USERNAME, (ConvertTo-SecureString $Env:WINRM_PASSWORD -AsPlainText -Force))

          Invoke-Command -ComputerName $Env:TARGET_SERVER -Credential $cred -ScriptBlock {
            Import-Module WebAdministration

            if (-not (Get-ChildItem IIS:\AppPools | Where-Object { $_.Name -eq $using:appPool })) {
              New-WebAppPool -Name $using:appPool
            }

            $clrVersion = if ([string]::IsNullOrWhiteSpace($using:appPoolClrVersion)) { "" } else { $using:appPoolClrVersion }
            Set-ItemProperty "IIS:\AppPools\$using:appPool" -Name managedRuntimeVersion -Value $clrVersion
            Write-Host "App pool CLR version set to: '$clrVersion'"

            Set-ItemProperty "IIS:\AppPools\$using:appPool" -Name processModel.identityType -Value 3
            Set-ItemProperty "IIS:\AppPools\$using:appPool" -Name processModel.userName -Value $using:serviceUser
            Set-ItemProperty "IIS:\AppPools\$using:appPool" -Name processModel.password -Value $using:servicePassword

            $existingApp = Get-WebApplication -Site $using:parentSite -Name $using:siteName -ErrorAction SilentlyContinue
            if ($null -eq $existingApp) {
              New-WebApplication -Site $using:parentSite -Name $using:siteName -PhysicalPath $using:deployPath -ApplicationPool $using:appPool
            } else {
              Set-ItemProperty "IIS:\Sites\$using:parentSite\$using:siteName" -Name physicalPath -Value $using:deployPath
              Set-ItemProperty "IIS:\Sites\$using:parentSite\$using:siteName" -Name applicationPool -Value $using:appPool
            }

            Start-WebAppPool -Name $using:appPool
            if ((Get-Website -Name $using:parentSite).State -ne 'Started') {
              Start-Website -Name $using:parentSite
            }
            Write-Host "IIS configured and app pool started: $using:appPool"
          }

      - name: Verify deployment
        shell: powershell
        run: |
          $deployPath = $Env:DEPLOY_PATH
          $cred = New-Object PSCredential($Env:WINRM_USERNAME, (ConvertTo-SecureString $Env:WINRM_PASSWORD -AsPlainText -Force))

          Invoke-Command -ComputerName $Env:TARGET_SERVER -Credential $cred -ScriptBlock {
            if (-not (Test-Path $using:deployPath)) {
              throw "Deployment path does not exist: $using:deployPath"
            }
            $files = Get-ChildItem -Path $using:deployPath -Recurse -File
            if ($files.Count -eq 0) {
              throw "No files found after deployment at: $using:deployPath"
            }
            Write-Host "Deployment verified. Files deployed: $($files.Count)"
          }

