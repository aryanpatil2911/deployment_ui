<!DOCTYPE html>
<html lang="en" class="h-full bg-[#020617]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linedata | Releases</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 9px; }
        input:focus, select:focus {
            box-shadow: 0 0 0 2px rgba(239, 68, 68, 0.4);
            border-color: #ef4444;
        }
    </style>
</head>
<body class="text-slate-200 bg-[#020617] p-4 md:p-8 min-h-screen">
    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <div class="flex items-center justify-between border-b border-slate-800 pb-6 mb-8">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-diagram-project text-red-500 text-3xl"></i>
                <h1 class="text-3xl font-black tracking-tighter text-white">
                    LINEDATA RELEASES
                </h1>
            </div>

            <!-- Navigation -->
            <div class="flex items-center gap-2 bg-slate-900 border border-slate-700 rounded-2xl p-1">
                <a href="index.html" 
                   class="flex items-center gap-2 px-6 py-3 rounded-xl text-sm font-medium transition-all hover:bg-slate-800">
                    <i class="fa-solid fa-list-check text-red-400"></i>
                    <span>Deployment Dashboard</span>
                </a>
            </div>

            <!-- Live Status -->
            <div class="flex items-center gap-2 text-sm font-mono">
                <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
                <span class="text-slate-400">Platform Development</span>
                <span class="text-emerald-400">• LIVE</span>
            </div>
        </div>

        <!-- Filters -->
        <div class="mb-8 bg-slate-900/60 border border-slate-800 rounded-2xl p-5">
            <div class="flex flex-wrap gap-3">
                <select id="appFilter" onchange="filterReleases()" 
                        class="bg-slate-900 border border-slate-700 px-4 py-3 rounded-xl text-sm flex-1 min-w-[200px]">
                    <option value="">All Applications</option>
                </select>
                <div class="relative flex-1 min-w-[280px]">
                    <i class="fa-solid fa-magnifying-glass absolute left-4 top-3.5 text-slate-500"></i>
                    <input id="search" type="text" placeholder="Search versions or filenames..."
                           onkeyup="filterReleases()" 
                           class="w-full bg-slate-900 border border-slate-700 rounded-xl pl-11 py-3 text-sm focus:outline-none">
                </div>
            </div>
        </div>

        <!-- Releases Grid -->
        <div id="releasesContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Populated by JS -->
        </div>
    </div>

    <!-- View Release Modal -->
    <div id="releaseModal" class="fixed inset-0 bg-black/80 hidden flex items-center justify-center z-50">
        <div class="bg-slate-900 border border-slate-700 rounded-3xl w-full max-w-3xl mx-4 max-h-[90vh] flex flex-col">
            <div class="flex items-center justify-between border-b border-slate-700 p-6">
                <h2 id="modalTitle" class="text-2xl font-semibold">Release Details</h2>
                <button onclick="closeReleaseModal()" class="text-slate-400 hover:text-white text-3xl leading-none">×</button>
            </div>
            <div class="p-6 overflow-auto flex-1 font-mono text-sm bg-slate-950" id="modalContent">
                <!-- YAML content loaded here -->
            </div>
            <div class="border-t border-slate-700 p-4 flex justify-end">
                <button onclick="closeReleaseModal()" 
                        class="px-8 py-3 bg-slate-800 hover:bg-slate-700 rounded-2xl text-sm font-medium">
                    Close
                </button>
            </div>
        </div>
    </div>

    <script>
        let allReleases = [];

        async function loadReleases() {
            const container = document.getElementById('releasesContainer');
            container.innerHTML = `<div class="col-span-full text-center py-16 text-slate-400">
                <i class="fa-solid fa-circle-notch fa-spin text-3xl mb-4"></i><p>Loading releases...</p>
            </div>`;

            try {
                const res = await fetch('../App/index.json');
                const files = await res.json();
                allReleases = files;

                // Populate App Filter
                const apps = [...new Set(files.map(f => {
                    const m = f.match(/APP_([A-Z]+)/i);
                    return m ? m[1] : null;
                }).filter(Boolean))];

                const appSelect = document.getElementById('appFilter');
                apps.forEach(app => {
                    appSelect.innerHTML += `<option value="${app}">${app}</option>`;
                });

                renderReleases(files);
            } catch (e) {
                container.innerHTML = `<div class="col-span-full text-red-500 text-center py-16">Failed to load releases</div>`;
            }
        }

        function renderReleases(files) {
            const container = document.getElementById('releasesContainer');
            let html = '';
            files.forEach(file => {
                const match = file.match(/APP_([A-Z]+)_([\d.]+)\.yml/i);
                if (!match) return;
                const app = match[1];
                const version = match[2];

                html += `
                    <div class="bg-slate-900 border border-slate-700 rounded-2xl p-6 hover:border-red-500/30 transition-all group">
                        <div class="flex justify-between items-start mb-4">
                            <h3 class="text-xl font-semibold text-white">${app}</h3>
                            <span class="px-3 py-1 text-xs font-mono bg-slate-800 rounded-full">${version}</span>
                        </div>
                        <div class="text-xs text-slate-500 font-mono mb-6">${file}</div>
                        <button onclick="viewRelease('${file}')" 
                                class="w-full py-3 text-sm bg-slate-800 hover:bg-slate-700 border border-slate-600 hover:border-red-500 rounded-xl transition-all">
                            View Release Details
                        </button>
                    </div>`;
            });
            container.innerHTML = html || `<div class="col-span-full text-center py-16 text-slate-400">No releases found</div>`;
        }

        function filterReleases() {
            const searchTerm = document.getElementById('search').value.toLowerCase();
            const selectedApp = document.getElementById('appFilter').value;

            const filtered = allReleases.filter(file => {
                const match = file.match(/APP_([A-Z]+)_([\d.]+)\.yml/i);
                if (!match) return false;
                const app = match[1];
                const version = match[2];
                const matchesApp = !selectedApp || app === selectedApp;
                const matchesSearch = !searchTerm || 
                    file.toLowerCase().includes(searchTerm) || 
                    version.includes(searchTerm);
                return matchesApp && matchesSearch;
            });

            renderReleases(filtered);
        }

        async function viewRelease(filename) {
            const modal = document.getElementById('releaseModal');
            const content = document.getElementById('modalContent');
            const title = document.getElementById('modalTitle');

            title.textContent = filename;
            content.innerHTML = `<div class="text-center py-12"><i class="fa-solid fa-circle-notch fa-spin text-2xl"></i><p class="mt-4">Loading release file...</p></div>`;
            modal.classList.remove('hidden');

            try {
                const res = await fetch(`../App/${filename}`);
                const yamlText = await res.text();
                content.innerHTML = `<pre class="bg-slate-950 p-6 rounded-2xl overflow-auto text-emerald-300 whitespace-pre-wrap text-xs leading-relaxed">${yamlText}</pre>`;
            } catch (e) {
                content.innerHTML = `<div class="text-red-500 text-center py-12">Failed to load file</div>`;
            }
        }

        function closeReleaseModal() {
            document.getElementById('releaseModal').classList.add('hidden');
        }

        // Load on start
        window.onload = loadReleases;
    </script>
</body>
</html>
